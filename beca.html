    class Shark {
      constructor(initial = false) {
        this.depth = random(0.68, 1.02);
        this.direction = chance(0.5) ? 1 : -1;
        this.phase = random(0, Math.PI * 2);
        this.variant = chance(0.24) ? "spotted" : "reef";
        this.speedBoost = 0;
        this.isBoss = false;
        this.rageTimer = 0;
        this.rageTurnTimer = 0;
        this.reseed(initial);
      }

      reseed(initial = false) {
        const mobile = viewWidth < 700;
        this.length = this.isBoss
          ? ((mobile ? random(210, 280) : random(300, 410)) * Math.max(0.96, this.depth))
          : (mobile ? random(118, 170) : random(170, 255)) * this.depth;
        this.height = this.length * (this.variant === "spotted" ? 0.21 : 0.185);
        this.speed = (this.isBoss ? random(18, 25) : random(22, 36)) * (0.88 + this.depth * 0.16);
        this.baseY = random(viewHeight * 0.24, viewHeight * 0.68);
        this.y = this.baseY;
        this.targetY = this.baseY;
        this.wanderTimer = random(2.0, 5.5);
        this.pitch = 0;
        this.opacity = this.isBoss ? 0.98 : lerp(0.72, 0.96, this.depth);

        if (initial) {
          this.x = random(-this.length * 0.15, viewWidth + this.length * 0.15);
        } else {
          this.x = this.direction === 1
            ? -this.length * 0.78
            : viewWidth + this.length * 0.78;
        }
      }

      containsPoint(x, y) {
        const dx = x - this.x;
        const dy = y - this.y;
        return Math.abs(dx) <= this.length * 0.58 && Math.abs(dy) <= this.height * 1.35;
      }

      setBoss(enabled = true) {
        if (this.isBoss === enabled) return;
        this.isBoss = enabled;
        if (enabled) this.variant = "reef";
        this.reseed(true);
      }

      enrage() {
        this.rageTimer = random(4.8, 6.8);
        this.rageTurnTimer = 0;
        this.speedBoost = random(2.4, 3.3);
        this.targetY = clamp(
          this.y + random(-95, 95),
          SETTINGS.waterTop + 65,
          viewHeight - SETTINGS.waterBottomPadding - 80
        );
      }

      startle(x, y) {
        if (Math.hypot(this.x - x, this.y - y) > Math.max(220, this.length * 1.7)) return;
        const away = this.y >= y ? 1 : -1;
        this.targetY = clamp(
          this.y + away * random(70, 130),
          SETTINGS.waterTop + 65,
          viewHeight - SETTINGS.waterBottomPadding - 80
        );
        this.speedBoost = random(1.4, 2.2);
      }

      update(dt, time) {
        this.wanderTimer -= dt;
        this.speedBoost = Math.max(0, this.speedBoost - dt);
        this.rageTurnTimer = Math.max(0, this.rageTurnTimer - dt);

        if (this.rageTimer > 0) {
          this.rageTimer = Math.max(0, this.rageTimer - dt);
          if (this.rageTurnTimer <= 0) {
            this.rageTurnTimer = random(0.18, 0.42);
            if (chance(0.42)) this.direction *= -1;
            this.targetY = clamp(
              this.baseY + Math.sin(time * 0.010 + this.phase) * viewHeight * 0.16 + random(-55, 55),
              SETTINGS.waterTop + 60,
              viewHeight - SETTINGS.waterBottomPadding - 80
            );
          }
        } else if (this.wanderTimer <= 0) {
          this.wanderTimer = random(2.5, 6.5);
          this.targetY = clamp(
            this.baseY + random(-viewHeight * 0.12, viewHeight * 0.12),
            SETTINGS.waterTop + 70,
            viewHeight - SETTINGS.waterBottomPadding - 75
          );
        }

        const desiredVertical = (this.targetY - this.y) * Math.min(1, dt * (this.rageTimer > 0 ? 2.3 : 0.85));
        this.y += desiredVertical;
        this.y += Math.sin(time * (this.rageTimer > 0 ? 0.0036 : 0.00048) + this.phase) * dt * (this.rageTimer > 0 ? 12 : 2.4);
        const pitchTarget = clamp(desiredVertical * (this.rageTimer > 0 ? 0.10 : 0.045), -0.22, 0.22);
        this.pitch += (pitchTarget - this.pitch) * Math.min(1, dt * (this.rageTimer > 0 ? 5.0 : 2.2));

        const boost = this.rageTimer > 0 ? 2.55 : (this.speedBoost > 0 ? 1.45 : 1);
        this.x += this.direction * this.speed * boost * dt;

        const passedRight = this.direction === 1 && this.x > viewWidth + this.length * 0.78;
        const passedLeft = this.direction === -1 && this.x < -this.length * 0.78;

        if (passedRight || passedLeft) {
          if (chance(0.42)) this.direction *= -1;
          if (!this.isBoss) this.variant = chance(0.24) ? "spotted" : "reef";
          this.reseed(false);
        }
      }

      draw(time) {
        const length = this.length;
        const height = this.height;
        const tailWave = Math.sin(time * 0.0054 + this.phase) * (0.18 + (this.speedBoost > 0 ? 0.08 : 0));
        const finWave = Math.sin(time * 0.0027 + this.phase) * 0.035;
        const mouthPulse = (Math.sin(time * 0.0036 + this.phase * 1.7) + 1) * 0.5;
        const mouthOpen = clamp(
          0.08 + mouthPulse * 0.20 + (this.rageTimer > 0 ? 0.18 : 0),
          0.08,
          0.42
        );

        ctx.save();
        ctx.translate(this.x + cameraX * 6 * this.depth, this.y + cameraY * 4 * this.depth);
        ctx.rotate(this.pitch);
        ctx.scale(this.direction, 1);
        ctx.globalAlpha = (this.rageTimer > 0 ? 1 : this.opacity) * (1 - nightAmount * 0.10);
        if (quality.filters && this.depth < 0.78) ctx.filter = "blur(0.45px)";

        // Bóng dưới thân.
        ctx.save();
        ctx.translate(-length * 0.04, height * 0.72);
        ctx.scale(1, 0.28);
        if (quality.filters) ctx.filter = `blur(${Math.max(5, length * 0.035)}px)`;
        ctx.fillStyle = "rgba(0, 13, 20, 0.30)";
        ctx.beginPath();
        ctx.ellipse(0, 0, length * 0.52, height * 0.85, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Vây ngực phía xa.
        ctx.fillStyle = "rgba(75, 104, 113, 0.68)";
        ctx.beginPath();
        ctx.moveTo(length * 0.10, height * 0.15);
        ctx.quadraticCurveTo(length * 0.04, height * 0.46, -length * 0.13, height * 1.20);
        ctx.quadraticCurveTo(length * 0.16, height * 0.77, length * 0.24, height * 0.25);
        ctx.closePath();
        ctx.fill();

        // Đuôi dị hình đặc trưng của cá mập.
        ctx.save();
        ctx.translate(-length * 0.47, 0);
        ctx.rotate(tailWave);
        const tailGradient = ctx.createLinearGradient(-length * 0.28, -height, length * 0.02, height);
        tailGradient.addColorStop(0, "#4d707b");
        tailGradient.addColorStop(0.52, "#78949d");
        tailGradient.addColorStop(1, "#2d505d");
        ctx.fillStyle = tailGradient;

        ctx.beginPath();
        ctx.moveTo(length * 0.02, 0);
        ctx.quadraticCurveTo(-length * 0.10, -height * 0.36, -length * 0.25, -height * 1.55);
        ctx.quadraticCurveTo(-length * 0.27, -height * 0.44, -length * 0.08, 0);
        ctx.quadraticCurveTo(-length * 0.16, height * 0.49, -length * 0.22, height * 1.01);
        ctx.quadraticCurveTo(-length * 0.08, height * 0.58, length * 0.02, 0);
        ctx.fill();
        ctx.restore();

        // Vây lưng.
        const dorsalGradient = ctx.createLinearGradient(0, -height * 1.8, 0, 0);
        dorsalGradient.addColorStop(0, "#314f59");
        dorsalGradient.addColorStop(1, "#77929a");
        ctx.fillStyle = dorsalGradient;
        ctx.beginPath();
        ctx.moveTo(-length * 0.17, -height * 0.56);
        ctx.quadraticCurveTo(-length * 0.04, -height * 1.76, length * 0.10, -height * 0.48);
        ctx.quadraticCurveTo(-length * 0.03, -height * 0.65, -length * 0.17, -height * 0.56);
        ctx.fill();

        // Thân thon, mõm nhọn và bụng phản sắc.
        const bodyGradient = ctx.createLinearGradient(0, -height * 1.05, 0, height * 1.05);
        bodyGradient.addColorStop(0, this.variant === "spotted" ? "#314f59" : "#3d5962");
        bodyGradient.addColorStop(0.34, this.variant === "spotted" ? "#5f7d85" : "#76919a");
        bodyGradient.addColorStop(0.60, "#a4b8bc");
        bodyGradient.addColorStop(0.77, "#d2d7d4");
        bodyGradient.addColorStop(1, "#657b80");
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.moveTo(-length * 0.48, 0);
        ctx.bezierCurveTo(-length * 0.28, -height * 0.72, length * 0.25, -height * 0.84, length * 0.51, -height * 0.20);
        ctx.quadraticCurveTo(length * 0.60, -height * 0.02, length * 0.55, height * 0.14);
        ctx.bezierCurveTo(length * 0.27, height * 0.76, -length * 0.28, height * 0.70, -length * 0.48, 0);
        ctx.closePath();
        ctx.fill();

        // Vệt phản sáng trên lưng.
        const sharkHighlight = ctx.createLinearGradient(0, -height, 0, height * 0.18);
        sharkHighlight.addColorStop(0, "rgba(236, 255, 255, 0.36)");
        sharkHighlight.addColorStop(0.50, "rgba(220, 248, 249, 0.07)");
        sharkHighlight.addColorStop(1, "rgba(220, 248, 249, 0)");
        ctx.fillStyle = sharkHighlight;
        ctx.beginPath();
        ctx.ellipse(length * 0.035, -height * 0.20, length * 0.39, height * 0.43, -0.02, Math.PI, Math.PI * 2);
        ctx.fill();

        // Đốm của biến thể cá mập voi nhỏ ở lớp trung cảnh.
        if (this.variant === "spotted") {
          ctx.save();
          ctx.globalAlpha *= 0.35;
          ctx.fillStyle = "rgba(225, 241, 235, 0.88)";
          for (let row = -2; row <= 2; row += 1) {
            for (let column = -6; column <= 4; column += 1) {
              const px = column * length * 0.055;
              const py = row * height * 0.24 + Math.sin(column * 1.7 + row) * height * 0.05;
              if (Math.abs(px) < length * 0.38 && Math.abs(py) < height * 0.52) {
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.8, length * 0.006), 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }
          ctx.restore();
        }

        // Vây ngực phía gần.
        ctx.save();
        ctx.translate(length * 0.14, height * 0.14);
        ctx.rotate(finWave);
        const nearPectoral = ctx.createLinearGradient(0, 0, -length * 0.18, height * 1.45);
        nearPectoral.addColorStop(0, "rgba(95, 124, 132, 0.96)");
        nearPectoral.addColorStop(1, "rgba(39, 75, 87, 0.50)");
        ctx.fillStyle = nearPectoral;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-length * 0.01, height * 0.56, -length * 0.20, height * 1.45);
        ctx.quadraticCurveTo(length * 0.11, height * 0.96, length * 0.17, height * 0.21);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Mắt.
        const eyeX = length * 0.39;
        const eyeY = -height * 0.21;
        ctx.fillStyle = this.rageTimer > 0 ? "rgba(185, 28, 28, 0.98)" : "rgba(5, 10, 12, 0.98)";
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, Math.max(1.7, length * 0.010), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(225, 248, 249, 0.86)";
        ctx.beginPath();
        ctx.arc(eyeX - length * 0.002, eyeY - length * 0.002, Math.max(0.45, length * 0.0026), 0, Math.PI * 2);
        ctx.fill();

        // Khe mang.
        ctx.strokeStyle = "rgba(27, 49, 56, 0.58)";
        ctx.lineWidth = Math.max(0.75, length * 0.0045);
        for (let index = 0; index < 5; index += 1) {
          const gx = length * (0.27 - index * 0.024);
          ctx.beginPath();
          ctx.moveTo(gx, -height * 0.24);
          ctx.quadraticCurveTo(gx - length * 0.012, 0, gx, height * 0.28);
          ctx.stroke();
        }

        // Miệng há khép có phần hàm dưới và răng nhỏ để nhìn thật hơn.
        const mouthStartX = length * 0.37;
        const mouthTipX = length * 0.55;
        const mouthY = height * 0.18;
        const jawDrop = height * (0.08 + mouthOpen * 0.75);

        ctx.fillStyle = this.rageTimer > 0
          ? "rgba(104, 17, 17, 0.34)"
          : "rgba(32, 16, 14, 0.26)";
        ctx.beginPath();
        ctx.moveTo(mouthStartX, mouthY);
        ctx.quadraticCurveTo(length * 0.46, mouthY + jawDrop * 0.15, mouthTipX, mouthY - height * 0.008);
        ctx.quadraticCurveTo(
          length * 0.47,
          mouthY + jawDrop,
          mouthStartX + length * 0.012,
          mouthY + jawDrop * 0.68
        );
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(24, 42, 47, 0.76)";
        ctx.lineWidth = Math.max(0.8, length * 0.004);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(mouthStartX, mouthY);
        ctx.quadraticCurveTo(length * 0.47, mouthY + height * 0.04, mouthTipX, mouthY - height * 0.012);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(mouthStartX + length * 0.008, mouthY + height * 0.02);
        ctx.quadraticCurveTo(
          length * 0.47,
          mouthY + jawDrop * 1.02,
          mouthTipX - length * 0.004,
          mouthY + jawDrop * 0.62
        );
        ctx.stroke();

        const teethCount = this.isBoss ? 8 : 6;
        ctx.fillStyle = "rgba(246, 248, 245, 0.96)";
        for (let toothIndex = 0; toothIndex < teethCount; toothIndex += 1) {
          const t = teethCount === 1 ? 0.5 : toothIndex / (teethCount - 1);
          const toothX = lerp(mouthStartX + length * 0.018, mouthTipX - length * 0.03, t);
          const toothSpread = Math.sin(t * Math.PI);
          const upperY = mouthY + height * (0.006 + toothSpread * 0.008);
          const toothHeight = height * (0.028 + mouthOpen * 0.11) * (0.75 + toothSpread * 0.28);
          const toothHalfWidth = Math.max(1.1, length * 0.0058 * (0.72 + toothSpread * 0.18));

          ctx.beginPath();
          ctx.moveTo(toothX - toothHalfWidth, upperY);
          ctx.lineTo(toothX + toothHalfWidth, upperY);
          ctx.lineTo(toothX, upperY + toothHeight);
          ctx.closePath();
          ctx.fill();

          const lowerBaseY = mouthY + jawDrop * (0.60 + toothSpread * 0.10);
          ctx.beginPath();
          ctx.moveTo(toothX - toothHalfWidth * 0.84, lowerBaseY);
          ctx.lineTo(toothX + toothHalfWidth * 0.84, lowerBaseY);
          ctx.lineTo(toothX, lowerBaseY - toothHeight * 0.52);
          ctx.closePath();
          ctx.fill();
        }

        ctx.strokeStyle = "rgba(42, 72, 80, 0.24)";
        ctx.lineWidth = Math.max(0.6, length * 0.003);
        ctx.beginPath();
        ctx.moveTo(-length * 0.33, 0);
        ctx.quadraticCurveTo(length * 0.04, height * 0.02, length * 0.34, -height * 0.04);
        ctx.stroke();

        ctx.restore();
      }
    }

    class SandPuff {
      constructor(x, y, size = 1) {
        this.x = x + random(-8, 8);
        this.y = y + random(-2, 4);
        this.radius = random(5, 11) * size;
        this.vx = random(-4, 4);
        this.vy = random(-9, -3);
        this.life = 1;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy *= Math.pow(0.94, dt * 60);
        this.radius += 7 * dt;
        this.life -= 0.58 * dt;
      }

      draw() {
        const width = this.radius * 3.1;
        const height = this.radius * 1.25;
        ctx.save();
        ctx.globalAlpha = clamp(this.life, 0, 1) * 0.22;
        ctx.drawImage(
          sandSprite,
          this.x - width * 0.5,
          this.y - height * 0.5,
          width,
          height
        );
        ctx.restore();
      }
    }

    class Crab {
      constructor(initial = false) {
        this.depth = random(0.96, 1.16);
        this.direction = chance(0.5) ? 1 : -1;
        this.phase = random(0, Math.PI * 2);
        this.targetFood = null;
        this.pauseTimer = random(0.4, 2.4);
        this.sprint = 0;
        this.reseed(initial);
      }

      reseed(initial = false) {
        this.width = (viewWidth < 700 ? random(48, 68) : random(58, 92)) * this.depth;
        this.height = this.width * 0.38;
        this.speed = random(4.5, 9.5);
        this.x = initial ? random(34, Math.max(35, viewWidth - 34)) : this.x;
        this.y = this.floorY();
      }

      floorY() {
        return viewHeight - random(30, 47) + Math.sin(this.x * 0.012 + this.phase) * 2.2;
      }

      startle(x, y) {
        if (Math.hypot(this.x - x, this.y - y) > 190) return;
        this.direction = this.x >= x ? 1 : -1;
        this.sprint = random(1.0, 1.8);
        this.pauseTimer = 0;
      }

      chooseFood() {
        let nearest = null;
        let nearestDistance = 380 * 380;

        for (const food of foods) {
          if (food.eaten || food.life <= 0) continue;
          if (food.y < viewHeight - 165) continue;

          const dx = food.x - this.x;
          const dy = food.y - this.y;
          const distanceSquared = dx * dx + dy * dy;
          if (distanceSquared < nearestDistance) {
            nearestDistance = distanceSquared;
            nearest = food;
          }
        }

        this.targetFood = nearest;
      }

      update(dt, time) {
        this.sprint = Math.max(0, this.sprint - dt);
        this.pauseTimer -= dt;

        if (!this.targetFood || this.targetFood.eaten || this.targetFood.life <= 0) {
          this.targetFood = null;
          this.chooseFood();
        }

        let moving = false;
        let speedScale = this.sprint > 0 ? 2.4 : 1;

        if (this.targetFood) {
          const dx = this.targetFood.x - this.x;
          this.direction = dx >= 0 ? 1 : -1;
          moving = Math.abs(dx) > this.width * 0.24;
          speedScale = 1.55;

          if (
            Math.abs(dx) < this.width * 0.38 &&
            this.targetFood.y > viewHeight - 125
          ) {
            this.targetFood.eaten = true;
            this.targetFood.life = 0;
            this.targetFood = null;
            this.pauseTimer = random(0.8, 1.7);
            underwaterAudio.playEatSound(0.62);
          }
        } else if (this.pauseTimer <= 0) {
          moving = true;
          if (chance(dt * 0.16)) {
            this.pauseTimer = random(0.6, 2.4);
            if (chance(0.28)) this.direction *= -1;
          }
        }

        if (moving) {
          this.x += this.direction * this.speed * speedScale * dt;
          if (chance(dt * (this.sprint > 0 ? 4.2 : 1.2))) {
            sandPuffs.push(new SandPuff(
              this.x - this.direction * this.width * 0.24,
              this.y + this.height * 0.34,
              this.depth
            ));
          }
        }

        const margin = this.width * 0.68;
        if (this.x < margin) {
          this.x = margin;
          this.direction = 1;
        }
        if (this.x > viewWidth - margin) {
          this.x = viewWidth - margin;
          this.direction = -1;
        }

        this.y += (this.floorY() - this.y) * Math.min(1, dt * 5);
        this.walkAmount = moving ? 1 : Math.max(0, (this.walkAmount || 0) - dt * 3);
      }

      draw(time) {
        const width = this.width;
        const height = this.height;
        const walk = Math.sin(time * 0.008 + this.phase) * (this.walkAmount || 0);
        const bob = Math.abs(Math.sin(time * 0.008 + this.phase)) * (this.walkAmount || 0) * 1.4;

        ctx.save();
        ctx.translate(this.x + cameraX * 2, this.y - bob);
        ctx.globalAlpha = 0.96 * (1 - nightAmount * 0.10);

        // Bóng tiếp xúc với cát.
        ctx.save();
        ctx.translate(0, height * 0.44 + bob);
        ctx.scale(1, 0.33);
        if (quality.filters) ctx.filter = `blur(${Math.max(3, width * 0.055)}px)`;
        ctx.fillStyle = "rgba(15, 12, 8, 0.48)";
        ctx.beginPath();
        ctx.ellipse(0, 0, width * 0.61, height * 0.58, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Chân phía sau, gồm các khớp gấp tự nhiên.
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const side of [-1, 1]) {
          for (let index = 0; index < 4; index += 1) {
            const alternating = walk * (index % 2 === 0 ? 1 : -1);
            const startX = side * width * (0.22 + index * 0.045);
            const startY = height * (0.04 + index * 0.075);
            const jointX = side * width * (0.44 + index * 0.07);
            const jointY = height * (0.22 + index * 0.10) + alternating * 2.8;
            const tipX = side * width * (0.62 + index * 0.10) + alternating * side * 4;
            const tipY = height * (0.47 + index * 0.10) - alternating * 1.5;

            ctx.strokeStyle = "rgba(58, 30, 18, 0.96)";
            ctx.lineWidth = Math.max(2.3, width * (0.058 - index * 0.006));
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(jointX, jointY);
            ctx.lineTo(tipX, tipY);
            ctx.stroke();

            ctx.strokeStyle = "rgba(196, 105, 52, 0.72)";
            ctx.lineWidth = Math.max(0.75, width * (0.017 - index * 0.0015));
            ctx.beginPath();
            ctx.moveTo(startX, startY - 1);
            ctx.lineTo(jointX, jointY - 1);
            ctx.lineTo(tipX, tipY - 1);
            ctx.stroke();
          }
        }

        // Hai càng lớn.
        for (const side of [-1, 1]) {
          const clawLift = Math.sin(time * 0.0028 + this.phase + side) * 0.10;
          ctx.save();
          ctx.translate(side * width * 0.29, -height * 0.02);
          ctx.rotate(side * (0.55 + clawLift));

          ctx.strokeStyle = "#6b331d";
          ctx.lineWidth = Math.max(5, width * 0.10);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.quadraticCurveTo(side * width * 0.12, -height * 0.28, side * width * 0.25, -height * 0.64);
          ctx.stroke();

          const clawGradient = ctx.createRadialGradient(
            side * width * 0.27,
            -height * 0.68,
            0,
            side * width * 0.27,
            -height * 0.68,
            width * 0.22
          );
          clawGradient.addColorStop(0, "#dc8b52");
          clawGradient.addColorStop(0.56, "#9c4f2c");
          clawGradient.addColorStop(1, "#512817");
          ctx.fillStyle = clawGradient;
          ctx.beginPath();
          ctx.ellipse(side * width * 0.29, -height * 0.70, width * 0.19, height * 0.34, side * 0.25, 0, Math.PI * 2);
          ctx.fill();

          // Hai ngón càng tạo khe kẹp.
          ctx.fillStyle = "#8c4427";
          ctx.beginPath();
          ctx.moveTo(side * width * 0.26, -height * 0.91);
          ctx.quadraticCurveTo(side * width * 0.39, -height * 1.18, side * width * 0.48, -height * 0.94);
          ctx.quadraticCurveTo(side * width * 0.39, -height * 0.92, side * width * 0.31, -height * 0.77);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(side * width * 0.31, -height * 0.72);
          ctx.quadraticCurveTo(side * width * 0.47, -height * 0.70, side * width * 0.49, -height * 0.52);
          ctx.quadraticCurveTo(side * width * 0.37, -height * 0.56, side * width * 0.24, -height * 0.62);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        // Mai cua gồ nhẹ với viền răng cưa.
        const shellGradient = ctx.createRadialGradient(
          -width * 0.12,
          -height * 0.22,
          width * 0.04,
          0,
          0,
          width * 0.58
        );
        shellGradient.addColorStop(0, "#e39a5d");
        shellGradient.addColorStop(0.36, "#bc6538");
        shellGradient.addColorStop(0.72, "#7d3d24");
        shellGradient.addColorStop(1, "#432318");
        ctx.fillStyle = shellGradient;
        ctx.beginPath();
        ctx.moveTo(-width * 0.48, height * 0.10);
        ctx.lineTo(-width * 0.43, -height * 0.15);
        ctx.lineTo(-width * 0.34, -height * 0.34);
        ctx.lineTo(-width * 0.22, -height * 0.43);
        ctx.quadraticCurveTo(0, -height * 0.58, width * 0.22, -height * 0.43);
        ctx.lineTo(width * 0.34, -height * 0.34);
        ctx.lineTo(width * 0.43, -height * 0.15);
        ctx.lineTo(width * 0.48, height * 0.10);
        ctx.quadraticCurveTo(width * 0.32, height * 0.43, 0, height * 0.48);
        ctx.quadraticCurveTo(-width * 0.32, height * 0.43, -width * 0.48, height * 0.10);
        ctx.closePath();
        ctx.fill();

        // Mép mai và vùng bụng.
        ctx.strokeStyle = "rgba(54, 25, 15, 0.80)";
        ctx.lineWidth = Math.max(1.1, width * 0.018);
        ctx.stroke();

        const bellyGradient = ctx.createLinearGradient(0, height * 0.08, 0, height * 0.50);
        bellyGradient.addColorStop(0, "rgba(233, 153, 96, 0.18)");
        bellyGradient.addColorStop(1, "rgba(74, 31, 19, 0.38)");
        ctx.fillStyle = bellyGradient;
        ctx.beginPath();
        ctx.ellipse(0, height * 0.24, width * 0.33, height * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();

        // Hạt và vệt sần trên mai.
        ctx.save();
        ctx.globalAlpha *= 0.38;
        for (let index = 0; index < (quality.detail ? 17 : 6); index += 1) {
          const px = -width * 0.31 + ((index * 29.4) % (width * 0.62));
          const py = -height * 0.27 + ((index * 17.2) % (height * 0.47));
          const radius = Math.max(0.7, width * (0.011 + (index % 3) * 0.003));
          ctx.fillStyle = index % 2 ? "rgba(75, 34, 20, 0.72)" : "rgba(236, 154, 94, 0.58)";
          ctx.beginPath();
          ctx.arc(px, py, radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        // Cuống mắt và mắt bóng.
        for (const side of [-1, 1]) {
          const eyeX = side * width * 0.18;
          ctx.strokeStyle = "#6d351f";
          ctx.lineWidth = Math.max(2.0, width * 0.035);
          ctx.beginPath();
          ctx.moveTo(eyeX * 0.82, -height * 0.35);
          ctx.lineTo(eyeX, -height * 0.61);
          ctx.stroke();

          ctx.fillStyle = "#17110d";
          ctx.beginPath();
          ctx.arc(eyeX, -height * 0.64, Math.max(2.1, width * 0.043), 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255, 244, 221, 0.88)";
          ctx.beginPath();
          ctx.arc(eyeX - side * width * 0.009, -height * 0.66, Math.max(0.55, width * 0.010), 0, Math.PI * 2);
          ctx.fill();
        }

        // Miệng nhỏ dưới mắt.
        ctx.strokeStyle = "rgba(48, 21, 14, 0.74)";
        ctx.lineWidth = Math.max(0.8, width * 0.015);
        ctx.beginPath();
        ctx.arc(0, -height * 0.25, width * 0.09, 0.22, Math.PI - 0.22);
        ctx.stroke();

        ctx.restore();
      }
    }


    // ============================================================
    // KHỞI TẠO, CHẤT LƯỢNG VÀ THAY ĐỔI KÍCH THƯỚC
    // ============================================================
    function desiredCount(desktop, mobile, scale = 1, minimum = 0) {
      const base = viewWidth < 700 ? mobile : desktop;
      return Math.max(minimum, Math.round(base * scale));
    }

    function syncCollection(collection, desiredLength, factory) {
      while (collection.length < desiredLength) collection.push(factory(true));
      if (collection.length > desiredLength) collection.length = desiredLength;
    }

    function syncFishSize(sizeClass, desiredLength) {
      const matching = fishes.filter(fish => fish.sizeClass === sizeClass);

      while (matching.length < desiredLength) {
        const fish = new Fish(sizeClass);
        fishes.push(fish);
        matching.push(fish);
      }

      if (matching.length > desiredLength) {
        const removeSet = new Set(matching.slice(desiredLength));
        for (let index = fishes.length - 1; index >= 0; index -= 1) {
          if (removeSet.has(fishes[index])) fishes.splice(index, 1);
        }
      }
    }

    function syncFishPopulation() {
      syncFishSize(
        "small",
        desiredCount(
          SETTINGS.desktopSmallFish,
          SETTINGS.mobileSmallFish,
          quality.creatureScale,
          8
        )
      );
      syncFishSize(
        "medium",
        desiredCount(
          SETTINGS.desktopMediumFish,
          SETTINGS.mobileMediumFish,
          quality.creatureScale,
          3
        )
      );
      syncFishSize(
        "large",
        desiredCount(
          SETTINGS.desktopLargeFish,
          SETTINGS.mobileLargeFish,
          quality.creatureScale,
          2
        )
      );
    }

    function rebuildRenderOrder() {
      renderSwimmers.length = 0;
      renderSwimmers.push(...fishes, ...dolphins, ...sharks);
      renderSwimmers.sort((a, b) => a.depth - b.depth);

      renderCrabs.length = 0;
      renderCrabs.push(...crabs);
      renderCrabs.sort((a, b) => a.depth - b.depth);

      farSeaweeds.length = 0;
      nearSeaweeds.length = 0;
      for (const seaweed of seaweeds) {
        (seaweed.foreground ? nearSeaweeds : farSeaweeds).push(seaweed);
      }
      farSeaweeds.sort((a, b) => a.depth - b.depth);
      nearSeaweeds.sort((a, b) => a.depth - b.depth);
    }

    function setQuality(nextName) {
      if (!QUALITY_PROFILES[nextName] || nextName === qualityName) return;
      qualityName = nextName;
      quality = QUALITY_PROFILES[qualityName];
      document.documentElement.dataset.quality = qualityName;
      slowSamples = 0;
      sampleFrames = 0;
      sampleStart = performance.now();
      resizeCanvas({ preserveScene: true, force: true });
    }

    function lowerQuality() {
      const currentIndex = QUALITY_ORDER.indexOf(qualityName);
      if (currentIndex > 0) setQuality(QUALITY_ORDER[currentIndex - 1]);
    }

    function resizeCanvas({ preserveScene = canvasInitialized, force = false } = {}) {
      const previousWidth = viewWidth;
      const previousHeight = viewHeight;
      const nextWidth = Math.max(1, window.innerWidth);
      const nextHeight = Math.max(1, window.innerHeight);

      const requestedDpr = Math.min(
        window.devicePixelRatio || 1,
        SETTINGS.maxDpr,
        quality.maxDpr
      );
      const budgetDpr = Math.sqrt(
        quality.maxPixels / Math.max(1, nextWidth * nextHeight)
      );
      const nextDpr = clamp(Math.min(requestedDpr, budgetDpr), 0.78, quality.maxDpr);
      const nextPixelWidth = Math.max(1, Math.round(nextWidth * nextDpr));
      const nextPixelHeight = Math.max(1, Math.round(nextHeight * nextDpr));
      const sizeChanged = nextWidth !== previousWidth || nextHeight !== previousHeight;
      const dprChanged = Math.abs(nextDpr - dpr) > 0.001;

      // Chrome/Edge trên máy tính có thể phát nhiều sự kiện resize giống hệt
      // nhau. Bỏ qua chúng để canvas không bị xóa rồi dựng lại hai lần.
      if (
        canvasInitialized &&
        !force &&
        !sizeChanged &&
        !dprChanged &&
        canvas.width === nextPixelWidth &&
        canvas.height === nextPixelHeight
      ) {
        return;
      }

      viewWidth = nextWidth;
      viewHeight = nextHeight;
      dpr = nextDpr;

      if (
        preserveScene &&
        canvasInitialized &&
        sizeChanged &&
        previousWidth > 1 &&
        previousHeight > 1
      ) {
        const scaleX = viewWidth / previousWidth;
        const scaleY = viewHeight / previousHeight;
        const sizeScale = clamp(Math.sqrt(Math.max(0.1, scaleX * scaleY)), 0.82, 1.22);

        for (const fish of fishes) {
          fish.x *= scaleX;
          fish.y *= scaleY;
        }

        for (const whale of whales) {
          whale.x *= scaleX;
          whale.y *= scaleY;
          whale.baseY *= scaleY;
          whale.length *= sizeScale;
          whale.height = whale.length * whale.bodyRatio;
          whale.buildSprite();
        }

        for (const dolphin of dolphins) {
          dolphin.x *= scaleX;
          dolphin.y *= scaleY;
          dolphin.baseY *= scaleY;
          dolphin.length *= sizeScale;
          dolphin.height = dolphin.length * dolphin.bodyRatio;
        }

        for (const shark of sharks) {
          shark.x *= scaleX;
          shark.y *= scaleY;
          shark.baseY *= scaleY;
          shark.targetY *= scaleY;
          shark.length *= sizeScale;
          shark.height = shark.length * (shark.variant === "spotted" ? 0.21 : 0.185);
        }

        for (const crab of crabs) {
          crab.x *= scaleX;
          crab.y = crab.floorY();
        }

        for (const seaweed of seaweeds) {
          const oldBottomOffset = previousHeight - seaweed.baseY;
          seaweed.x *= scaleX;
          seaweed.baseY = viewHeight - oldBottomOffset * scaleY;
          seaweed.height = clamp(
            seaweed.height * scaleY,
            62,
            seaweed.foreground ? 390 : 280
          );
        }

        for (const particle of dustParticles) {
          particle.x *= scaleX;
          particle.y *= scaleY;
        }
        for (const bubble of bubbles) {
          bubble.x *= scaleX;
          bubble.y *= scaleY;
        }
        for (const food of foods) {
          food.x *= scaleX;
          food.y *= scaleY;
        }
        for (const ripple of ripples) {
          ripple.x *= scaleX;
          ripple.y *= scaleY;
        }
        for (const puff of sandPuffs) {
          puff.x *= scaleX;
          puff.y *= scaleY;
        }
      }

      canvas.width = nextPixelWidth;
      canvas.height = nextPixelHeight;
      canvas.style.width = `${viewWidth}px`;
      canvas.style.height = `${viewHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "medium";

      syncFishPopulation();
      syncCollection(
        dustParticles,
        desiredCount(SETTINGS.desktopDust, SETTINGS.mobileDust, quality.particleScale, 34),
        initial => new DustParticle(initial)
      );
      syncCollection(
        bubbles,
        desiredCount(SETTINGS.desktopBubbles, SETTINGS.mobileBubbles, quality.particleScale, 18),
        initial => new Bubble(initial)
      );
      syncCollection(
        whales,
        desiredCount(SETTINGS.desktopWhales, SETTINGS.mobileWhales, 1, 1),
        initial => new BlueWhale(initial)
      );
      syncCollection(
        dolphins,
        desiredCount(SETTINGS.desktopDolphins, SETTINGS.mobileDolphins, quality.creatureScale, 1),
        initial => new Dolphin(initial)
      );
      syncCollection(
        sharks,
        desiredCount(SETTINGS.desktopSharks, SETTINGS.mobileSharks, quality.creatureScale, 1),
        initial => new Shark(initial)
      );
      syncCollection(
        crabs,
        desiredCount(SETTINGS.desktopCrabs, SETTINGS.mobileCrabs, quality.creatureScale, 2),
        initial => new Crab(initial)
      );
      syncCollection(
        seaweeds,
        desiredCount(SETTINGS.desktopSeaweed, SETTINGS.mobileSeaweed, quality.seaweedScale, 7),
        initial => new Seaweed(initial)
      );

      for (const fish of fishes) {
        fish.x = clamp(fish.x, -fish.length, viewWidth + fish.length);
        fish.y = clamp(
          fish.y,
          SETTINGS.waterTop + 20,
          viewHeight - SETTINGS.waterBottomPadding
        );
      }

      for (const whale of whales) {
        whale.x = clamp(whale.x, -whale.length, viewWidth + whale.length);
        whale.baseY = clamp(
          whale.baseY,
          SETTINGS.waterTop + whale.height,
          viewHeight - SETTINGS.waterBottomPadding - whale.height * 1.5
        );
        whale.y = clamp(
          whale.y,
          SETTINGS.waterTop + whale.height,
          viewHeight - SETTINGS.waterBottomPadding - whale.height
        );
      }

      for (const dolphin of dolphins) {
        dolphin.x = clamp(dolphin.x, -dolphin.length, viewWidth + dolphin.length);
        dolphin.baseY = clamp(
          dolphin.baseY,
          SETTINGS.waterTop + dolphin.height * 1.2,
          viewHeight - SETTINGS.waterBottomPadding - dolphin.height * 1.4
        );
        dolphin.y = clamp(
          dolphin.y,
          SETTINGS.waterTop + dolphin.height,
          viewHeight - SETTINGS.waterBottomPadding - dolphin.height
        );
      }

      for (const shark of sharks) {
        shark.x = clamp(shark.x, -shark.length, viewWidth + shark.length);
        shark.baseY = clamp(shark.baseY, SETTINGS.waterTop + 55, viewHeight - 120);
        shark.targetY = clamp(shark.targetY, SETTINGS.waterTop + 55, viewHeight - 120);
        shark.y = clamp(shark.y, SETTINGS.waterTop + 55, viewHeight - 100);
      }

      for (const crab of crabs) {
        const margin = Math.min(viewWidth * 0.45, crab.width * 0.68);
        crab.x = clamp(crab.x, margin, Math.max(margin, viewWidth - margin));
        crab.y = crab.floorY();
      }

      for (const seaweed of seaweeds) {
        seaweed.x = clamp(seaweed.x, -90, viewWidth + 90);
        seaweed.baseY = clamp(seaweed.baseY, viewHeight * 0.72, viewHeight - 2);
      }

      // Lần đầu: đặt duy nhất cá voi xanh lớn ở lớp xa và cá heo ở trung cảnh.
      if (sharks.length) {
        if (!sharks[0].isBoss) {
          sharks[0].isBoss = true;
          sharks[0].variant = "reef";
          sharks[0].reseed(true);
        }
        for (let index = 1; index < sharks.length; index += 1) {
          sharks[index].isBoss = false;
        }
      }

      if (!canvasInitialized) {
        if (whales.length) {
          const whale = whales[0];
          whale.direction = 1;
          whale.x = viewWidth * 0.43;
          whale.baseY = clamp(
            viewHeight * 0.27,
            SETTINGS.waterTop + whale.height,
            viewHeight - SETTINGS.waterBottomPadding - whale.height * 1.55
          );
          whale.y = whale.baseY;
        }

        if (dolphins.length) {
          const dolphin = dolphins[0];
          dolphin.direction = -1;
          dolphin.x = viewWidth * 0.79;
          dolphin.baseY = clamp(
            viewHeight * 0.24,
            SETTINGS.waterTop + dolphin.height * 1.2,
            viewHeight - SETTINGS.waterBottomPadding - dolphin.height * 1.4
          );
          dolphin.y = dolphin.baseY;
        }

        if (sharks.length) {
          const shark = sharks[0];
          shark.direction = 1;
          shark.x = viewWidth * 0.18;
          shark.baseY = clamp(
            viewHeight * 0.38,
            SETTINGS.waterTop + 60,
            viewHeight - SETTINGS.waterBottomPadding - 120
          );
          shark.y = shark.baseY;
          shark.targetY = shark.baseY;
        }
      }

      rebuildRenderOrder();
      buildStaticCaches();

      lastTime = performance.now();
      lastRenderedAt = lastTime;
      canvasInitialized = true;
    }

    // ============================================================
    // VẼ MÔI TRƯỜNG ĐÃ ĐƯỢC BỘ ĐỆM HÓA
    // ============================================================
    function sizeBuffer(buffer, logicalWidth, logicalHeight, alpha = true) {
      const scale = quality.cacheScale;
      buffer.width = Math.max(1, Math.round(logicalWidth * scale));
      buffer.height = Math.max(1, Math.round(logicalHeight * scale));
      const bufferContext = buffer.getContext("2d", { alpha });
      bufferContext.setTransform(scale, 0, 0, scale, 0, 0);
      bufferContext.imageSmoothingEnabled = true;
      bufferContext.imageSmoothingQuality = "medium";
      bufferContext.clearRect(0, 0, logicalWidth, logicalHeight);
      return bufferContext;
    }

    function paintFallbackBackground(targetContext) {
      const gradient = targetContext.createLinearGradient(0, 0, 0, viewHeight);
      gradient.addColorStop(0, "#0c6c83");
      gradient.addColorStop(0.42, "#0a4d65");
      gradient.addColorStop(1, "#062c3c");
      targetContext.fillStyle = gradient;
      targetContext.fillRect(0, 0, viewWidth, viewHeight);
    }

    function paintSceneBuffer(buffer, night) {
      const bufferContext = sizeBuffer(buffer, viewWidth, viewHeight, false);

      if (backgroundReady) {
        bufferContext.filter = night
          ? "brightness(0.46) saturate(0.66) contrast(1.14)"
          : "brightness(0.98) saturate(0.96) contrast(1.05)";
        drawImageCoverOn(
          bufferContext,
          backgroundImage,
          0,
          0,
          viewWidth,
          viewHeight,
          0.5,
          0.5
        );
        bufferContext.filter = "none";
      } else {
        paintFallbackBackground(bufferContext);
      }

      const waterTint = bufferContext.createLinearGradient(0, 0, 0, viewHeight);
      waterTint.addColorStop(0, night ? "rgba(7,119,159,0.20)" : "rgba(7,119,159,0.13)");
      waterTint.addColorStop(0.48, night ? "rgba(0,57,83,0.30)" : "rgba(0,57,83,0.15)");
      waterTint.addColorStop(1, night ? "rgba(0,17,29,0.48)" : "rgba(0,17,29,0.22)");
      bufferContext.fillStyle = waterTint;
      bufferContext.fillRect(0, 0, viewWidth, viewHeight);

      const centerX = viewWidth * 0.52;
      const haze = bufferContext.createRadialGradient(
        centerX,
        viewHeight * 0.30,
        0,
        centerX,
        viewHeight * 0.42,
        Math.max(viewWidth, viewHeight) * 0.76
      );
      haze.addColorStop(0, night ? "rgba(91,185,205,0.025)" : "rgba(91,185,205,0.075)");
      haze.addColorStop(0.46, night ? "rgba(13,83,105,0.12)" : "rgba(13,83,105,0.045)");
      haze.addColorStop(1, night ? "rgba(0,20,32,0.30)" : "rgba(0,20,32,0.15)");
      bufferContext.fillStyle = haze;
      bufferContext.fillRect(0, 0, viewWidth, viewHeight);

      const bottomFog = bufferContext.createLinearGradient(
        0,
        viewHeight * 0.62,
        0,
        viewHeight
      );
      bottomFog.addColorStop(0, "rgba(4,44,57,0)");
      bottomFog.addColorStop(1, night ? "rgba(0,15,24,0.31)" : "rgba(0,15,24,0.12)");
      bufferContext.fillStyle = bottomFog;
      bufferContext.fillRect(0, viewHeight * 0.58, viewWidth, viewHeight * 0.42);

      if (night) {
        const nightGradient = bufferContext.createRadialGradient(
          viewWidth * 0.58,
          viewHeight * 0.04,
          10,
          viewWidth * 0.58,
          viewHeight * 0.15,
          viewWidth * 0.78
        );
        nightGradient.addColorStop(0, "rgba(95,157,190,0.11)");
        nightGradient.addColorStop(0.44, "rgba(3,25,52,0.20)");
        nightGradient.addColorStop(1, "rgba(0,8,27,0.54)");
        bufferContext.fillStyle = nightGradient;
        bufferContext.fillRect(0, 0, viewWidth, viewHeight);
      }

      // Tia sáng được ghép sẵn vào ảnh nền, tránh thêm một lần vẽ toàn màn hình.
      bufferContext.save();
      bufferContext.globalCompositeOperation = "screen";
      bufferContext.globalAlpha = night ? 0.28 : 1;
      const rayGradient = bufferContext.createLinearGradient(0, 0, 0, viewHeight);
      rayGradient.addColorStop(0, "rgba(223,251,255,0.18)");
      rayGradient.addColorStop(0.52, "rgba(155,225,235,0.06)");
      rayGradient.addColorStop(1, "rgba(110,200,217,0)");
      bufferContext.fillStyle = rayGradient;
      const sourceX = viewWidth * 0.50;
      for (let index = 0; index < quality.rays; index += 1) {
        const centeredIndex = index - (quality.rays - 1) / 2;
        const offset = centeredIndex * viewWidth * 0.13;
        const width = viewWidth * (0.12 + (index % 2) * 0.022);
        const endX = sourceX + offset * 1.34;
        bufferContext.beginPath();
        bufferContext.moveTo(sourceX + offset - width * 0.30, -20);
        bufferContext.lineTo(sourceX + offset + width * 0.30, -20);
        bufferContext.lineTo(endX + width * 1.10, viewHeight);
        bufferContext.lineTo(endX - width * 1.10, viewHeight);
        bufferContext.closePath();
        bufferContext.fill();
      }
      bufferContext.restore();

      // Viền kính cũng được ghép sẵn vào ảnh nền để giảm một bitmap toàn màn hình.
      const vignette = bufferContext.createRadialGradient(
        viewWidth * 0.5,
        viewHeight * 0.43,
        Math.min(viewWidth, viewHeight) * 0.14,
        viewWidth * 0.5,
        viewHeight * 0.50,
        Math.max(viewWidth, viewHeight) * 0.72
      );
      vignette.addColorStop(0, "rgba(0,10,15,0)");
      vignette.addColorStop(0.73, "rgba(0,10,16,0.04)");
      vignette.addColorStop(1, "rgba(0,8,14,0.38)");
      bufferContext.fillStyle = vignette;
      bufferContext.fillRect(0, 0, viewWidth, viewHeight);
    }

    function paintRayBuffer() {
      const overscan = 140;
      const logicalWidth = viewWidth + overscan;
      const rayContext = sizeBuffer(rayCanvas, logicalWidth, viewHeight, true);
      rayContext.globalCompositeOperation = "screen";

      const gradient = rayContext.createLinearGradient(0, 0, 0, viewHeight);
      gradient.addColorStop(0, "rgba(223,251,255,0.20)");
      gradient.addColorStop(0.52, "rgba(155,225,235,0.072)");
      gradient.addColorStop(1, "rgba(110,200,217,0)");
      rayContext.fillStyle = gradient;

      const sourceX = logicalWidth * 0.50;
      for (let index = 0; index < quality.rays; index += 1) {
        const centeredIndex = index - (quality.rays - 1) / 2;
        const offset = centeredIndex * viewWidth * 0.13;
        const width = viewWidth * (0.12 + (index % 2) * 0.022);
        const endX = sourceX + offset * 1.34;

        rayContext.beginPath();
        rayContext.moveTo(sourceX + offset - width * 0.30, -20);
        rayContext.lineTo(sourceX + offset + width * 0.30, -20);
        rayContext.lineTo(endX + width * 1.10, viewHeight);
        rayContext.lineTo(endX - width * 1.10, viewHeight);
        rayContext.closePath();
        rayContext.fill();
      }

      const surfaceGradient = rayContext.createLinearGradient(0, 0, 0, 118);
      surfaceGradient.addColorStop(0, "rgba(232,255,255,0.22)");
      surfaceGradient.addColorStop(1, "rgba(232,255,255,0)");
      rayContext.fillStyle = surfaceGradient;
      rayContext.fillRect(0, 0, logicalWidth, 118);
    }

    function paintGlassBuffer() {
      const glassContext = sizeBuffer(glassCanvas, viewWidth, viewHeight, true);
      const vignette = glassContext.createRadialGradient(
        viewWidth * 0.5,
        viewHeight * 0.43,
        Math.min(viewWidth, viewHeight) * 0.14,
        viewWidth * 0.5,
        viewHeight * 0.50,
        Math.max(viewWidth, viewHeight) * 0.72
      );
      vignette.addColorStop(0, "rgba(0,10,15,0)");
      vignette.addColorStop(0.73, "rgba(0,10,16,0.04)");
      vignette.addColorStop(1, "rgba(0,8,14,0.40)");
      glassContext.fillStyle = vignette;
      glassContext.fillRect(0, 0, viewWidth, viewHeight);

      const leftGlass = glassContext.createLinearGradient(0, 0, 36, 0);
      leftGlass.addColorStop(0, "rgba(255,255,255,0.10)");
      leftGlass.addColorStop(1, "rgba(255,255,255,0)");
      glassContext.fillStyle = leftGlass;
      glassContext.fillRect(0, 0, 36, viewHeight);

      const rightGlass = glassContext.createLinearGradient(viewWidth, 0, viewWidth - 36, 0);
      rightGlass.addColorStop(0, "rgba(255,255,255,0.08)");
      rightGlass.addColorStop(1, "rgba(255,255,255,0)");
      glassContext.fillStyle = rightGlass;
      glassContext.fillRect(viewWidth - 36, 0, 36, viewHeight);
    }

    function paintParticleSprites() {
      bubbleSprite.width = 64;
      bubbleSprite.height = 64;
      const bubbleContext = bubbleSprite.getContext("2d");
      bubbleContext.clearRect(0, 0, 64, 64);
      const bubbleGradient = bubbleContext.createRadialGradient(23, 21, 2, 32, 32, 25);
      bubbleGradient.addColorStop(0, "rgba(255,255,255,0.95)");
      bubbleGradient.addColorStop(0.25, "rgba(218,248,255,0.22)");
      bubbleGradient.addColorStop(0.78, "rgba(190,236,248,0.04)");
      bubbleGradient.addColorStop(1, "rgba(255,255,255,0.42)");
      bubbleContext.fillStyle = bubbleGradient;
      bubbleContext.strokeStyle = "rgba(227,251,255,0.60)";
      bubbleContext.lineWidth = 3;
      bubbleContext.beginPath();
      bubbleContext.arc(32, 32, 24, 0, Math.PI * 2);
      bubbleContext.fill();
      bubbleContext.stroke();

      foodSprite.width = 48;
      foodSprite.height = 48;
      const foodContext = foodSprite.getContext("2d");
      foodContext.clearRect(0, 0, 48, 48);
      const foodGradient = foodContext.createRadialGradient(18, 17, 0, 24, 24, 19);
      foodGradient.addColorStop(0, "rgba(255,226,116,1)");
      foodGradient.addColorStop(0.52, "rgba(201,111,40,1)");
      foodGradient.addColorStop(1, "rgba(91,43,17,0)");
      foodContext.fillStyle = foodGradient;
      foodContext.beginPath();
      foodContext.arc(24, 24, 19, 0, Math.PI * 2);
      foodContext.fill();

      sandSprite.width = 128;
      sandSprite.height = 64;
      const sandContext = sandSprite.getContext("2d");
      sandContext.clearRect(0, 0, 128, 64);
      sandContext.save();
      sandContext.translate(64, 32);
      sandContext.scale(1.45, 0.55);
      const sandGradient = sandContext.createRadialGradient(0, 0, 0, 0, 0, 38);
      sandGradient.addColorStop(0, "rgba(221,207,166,1)");
      sandGradient.addColorStop(0.52, "rgba(179,160,119,0.55)");
      sandGradient.addColorStop(1, "rgba(120,105,78,0)");
      sandContext.fillStyle = sandGradient;
      sandContext.beginPath();
      sandContext.arc(0, 0, 38, 0, Math.PI * 2);
      sandContext.fill();
      sandContext.restore();
    }

    function buildStaticCaches() {
      if (viewWidth < 1 || viewHeight < 1) return;
      paintSceneBuffer(daySceneCanvas, false);
      paintSceneBuffer(nightSceneCanvas, true);
      paintParticleSprites();
      lastCausticPaint = -Infinity;
      paintCausticFrame(performance.now());
      environmentCacheReady = true;
    }

    function drawBackground() {
      if (!environmentCacheReady) {
        paintFallbackBackground(ctx);
        return;
      }

      // Vẽ ở tọa độ nguyên và không dịch ảnh theo chuột để loại bỏ hiện tượng
      // rung/nhòe toàn màn hình trên desktop.
      const pad = 4;
      const drawX = -pad;
      const drawY = -pad;
      const drawWidth = viewWidth + pad * 2;
      const drawHeight = viewHeight + pad * 2;

      ctx.save();
      if (nightAmount < 0.002) {
        ctx.drawImage(daySceneCanvas, drawX, drawY, drawWidth, drawHeight);
      } else if (nightAmount > 0.998) {
        ctx.drawImage(nightSceneCanvas, drawX, drawY, drawWidth, drawHeight);
      } else {
        ctx.globalAlpha = 1 - nightAmount;
        ctx.drawImage(daySceneCanvas, drawX, drawY, drawWidth, drawHeight);
        ctx.globalAlpha = nightAmount;
        ctx.drawImage(nightSceneCanvas, drawX, drawY, drawWidth, drawHeight);
      }
      ctx.restore();
    }

    function drawLightRays(time) {
      if (!environmentCacheReady) return;
      const overscan = 140;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = lerp(1, 0.28, nightAmount);
      const shift = Math.sin(time * 0.00009) * 22;
      ctx.drawImage(rayCanvas, -overscan * 0.5 + shift, 0, viewWidth + overscan, viewHeight);
      ctx.restore();
    }

    function paintCausticFrame(time) {
      const logicalHeight = 72;
      const scale = clamp(quality.cacheScale, 0.72, 1);
      const pixelWidth = Math.max(1, Math.round(viewWidth * scale));
      const pixelHeight = Math.max(1, Math.round(logicalHeight * scale));

      if (causticCanvas.width !== pixelWidth || causticCanvas.height !== pixelHeight) {
        causticCanvas.width = pixelWidth;
        causticCanvas.height = pixelHeight;
      }

      const target = causticCanvas.getContext("2d", { alpha: true });
      target.setTransform(scale, 0, 0, scale, 0, 0);
      target.clearRect(0, 0, viewWidth, logicalHeight);
      target.strokeStyle = "rgba(211,251,255,0.52)";
      target.lineWidth = qualityName === "low" ? 0.85 : 1.05;

      const rows = quality.causticRows;
      const step = qualityName === "high" ? 22 : 27;
      for (let row = 0; row < rows; row += 1) {
        const baseY = 12 + row * 11;
        target.beginPath();
        let first = true;
        for (let x = -28; x <= viewWidth + 28; x += step) {
          const y =
            baseY +
            Math.sin(x * 0.025 + time * 0.0011 + row * 0.8) * 3.4 +
            Math.sin(x * 0.011 - time * 0.0008 + row) * 1.9;
          if (first) {
            target.moveTo(x, y);
            first = false;
          } else {
            target.lineTo(x, y);
          }
        }
        target.stroke();
      }
      lastCausticPaint = time;
    }

    function drawSurfaceCaustics(time) {
      if (time - lastCausticPaint >= 33 || !causticCanvas.width) {
        paintCausticFrame(time);
      }
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = lerp(0.34, 0.10, nightAmount);
      ctx.drawImage(causticCanvas, 0, 0, viewWidth, 72);
      ctx.restore();
    }

    function drawNightLife(time) {
      if (nightAmount <= 0.01) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const count = quality.detail ? 12 : 6;
      for (let index = 0; index < count; index += 1) {
        const x = (index * 97.31 + Math.sin(time * 0.0002 + index) * 22) % viewWidth;
        const y = (index * 61.77 + Math.cos(time * 0.00017 + index) * 18) % viewHeight;
        const alpha = (0.07 + Math.sin(time * 0.0013 + index) * 0.035) * nightAmount;
        ctx.fillStyle = `rgba(109,223,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, 1.2 + (index % 3) * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawGlassVignette() {
      if (!environmentCacheReady) return;
      ctx.drawImage(glassCanvas, 0, 0, viewWidth, viewHeight);
    }

    // ============================================================
    // TƯƠNG TÁC
    // ============================================================
    function releaseFood(x, y) {
      const safeX = clamp(x, 20, viewWidth - 20);
      const safeY = clamp(
        y,
        SETTINGS.waterTop + 8,
        viewHeight - SETTINGS.waterBottomPadding - 20
      );

      const ripple = new Ripple(safeX, safeY);
      ripple.radius = 14;
      ripple.alpha = 0.38;
      ripples.push(ripple);

      const amount = viewWidth < 700 ? 7 : 10;
      for (let index = 0; index < amount; index += 1) {
        foods.push(new FoodParticle(safeX, safeY));
      }

      // Cá trong vùng gần sẽ nhận biết thức ăn trước.
      const nearby = fishes
        .filter(fish => Math.hypot(fish.x - safeX, fish.y - safeY) < viewWidth * 0.58)
        .sort(() => Math.random() - 0.5);

      for (let index = 0; index < Math.min(nearby.length, amount + 4); index += 1) {
        nearby[index].targetFood = foods[foods.length - 1 - (index % amount)];
      }

      // Cua có thể phản ứng khi thức ăn rơi gần; cá mập và cá heo không có hiệu ứng khi nhấn.
      for (const crab of crabs) crab.startle(safeX, safeY);
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    canvas.addEventListener("pointermove", event => {
      if (!SETTINGS.enablePointerParallax) return;
      const position = pointerPosition(event);
      pointerTargetX = clamp((position.x / Math.max(1, viewWidth) - 0.5) * 2, -1, 1);
      pointerTargetY = clamp((position.y / Math.max(1, viewHeight) - 0.5) * 2, -1, 1);
    }, { passive: true });

    canvas.addEventListener("pointerleave", () => {
      pointerTargetX = 0;
      pointerTargetY = 0;
    }, { passive: true });

    canvas.addEventListener("pointerdown", event => {
      const position = pointerPosition(event);
      releaseFood(position.x, position.y);
    });

    canvas.addEventListener("contextmenu", event => event.preventDefault());

    backButton.addEventListener("click", () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = "index.html";
    });

    themeButton.addEventListener("click", () => {
      isNight = !isNight;
      themeButton.setAttribute("aria-pressed", String(isNight));

      if (isNight) {
        themeIcon.innerHTML = `
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"></path>
        `;
      } else {
        themeIcon.innerHTML = `
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.42 1.42"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        `;
      }
    });

    soundButton.addEventListener("click", async () => {
      try {
        if (underwaterAudio.enabled) {
          underwaterAudio.disable();
        } else {
          await underwaterAudio.enable();
        }

        soundButton.setAttribute("aria-pressed", String(underwaterAudio.enabled));

        soundIcon.innerHTML = underwaterAudio.enabled
          ? `
            <path d="M11 5 6 9H2v6h4l5 4Z"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <path d="M18.07 5.93a9 9 0 0 1 0 12.73"></path>
          `
          : `
            <path d="M11 5 6 9H2v6h4l5 4Z"></path>
            <path d="m22 9-6 6"></path>
            <path d="m16 9 6 6"></path>
          `;
      } catch (error) {
        console.warn(error);
      }
    });

    window.addEventListener("keydown", event => {
      if (event.key.toLowerCase() === "d") themeButton.click();
      if (event.key.toLowerCase() === "m") soundButton.click();
      if (event.key.toLowerCase() === "f") {
        releaseFood(viewWidth * 0.5, viewHeight * 0.35);
      }
    });

    window.addEventListener("resize", () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => resizeCanvas({ preserveScene: true }), 140);
    }, { passive: true });

    document.addEventListener("visibilitychange", () => {
      pageVisible = !document.hidden;
      lastTime = performance.now();
      lastRenderedAt = lastTime;

      if (pageVisible) startAnimationLoop();
      else stopAnimationLoop();
    });

    // ============================================================
    // VÒNG LẶP HOẠT HÌNH
    // ============================================================
    function update(dt, time) {
      const targetNightAmount = isNight ? 1 : 0;
      nightAmount += (targetNightAmount - nightAmount) * Math.min(1, dt * 2.4);
      if (SETTINGS.enablePointerParallax) {
        cameraX += (pointerTargetX - cameraX) * Math.min(1, dt * 1.45);
        cameraY += (pointerTargetY - cameraY) * Math.min(1, dt * 1.25);
      } else {
        pointerTargetX = 0;
        pointerTargetY = 0;
        cameraX = 0;
        cameraY = 0;
      }

      for (const particle of dustParticles) particle.update(dt, time);
      for (const bubble of bubbles) bubble.update(dt, time);
      for (const whale of whales) whale.update(dt, time);
      for (const dolphin of dolphins) dolphin.update(dt, time);
      for (const shark of sharks) shark.update(dt, time);
      for (const fish of fishes) fish.update(dt, time);
      for (const crab of crabs) crab.update(dt, time);
      for (const puff of sandPuffs) puff.update(dt);
      for (const food of foods) food.update(dt, time);
      for (const ripple of ripples) ripple.update(dt);

      if (underwaterAudio.enabled && time >= nextWhaleCall) {
        underwaterAudio.playWhaleCall();
        nextWhaleCall = time + random(24000, 42000);
      }

      for (let index = foods.length - 1; index >= 0; index -= 1) {
        if (foods[index].life <= 0 || foods[index].eaten) foods.splice(index, 1);
      }
      for (let index = ripples.length - 1; index >= 0; index -= 1) {
        if (ripples[index].alpha <= 0) ripples.splice(index, 1);
      }
      for (let index = sandPuffs.length - 1; index >= 0; index -= 1) {
        if (sandPuffs[index].life <= 0) sandPuffs.splice(index, 1);
      }

      if (sandPuffs.length > 72) sandPuffs.splice(0, sandPuffs.length - 72);
      if (foods.length > 80) foods.splice(0, foods.length - 80);
      if (ripples.length > 16) ripples.splice(0, ripples.length - 16);
    }

    function draw(time) {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, viewWidth, viewHeight);

      drawBackground(time);

      // Cá voi xanh lớn được vẽ ngay trên nền để nằm xa và mờ nhẹ.
      for (const whale of whales) whale.draw(time);

      drawSurfaceCaustics(time);

      // Rong xa nằm sau toàn bộ sinh vật; rong gần che nhẹ lớp đáy.
      for (const seaweed of farSeaweeds) seaweed.draw(time);

      for (let index = 0; index < dustParticles.length; index += 2) {
        dustParticles[index].draw();
      }

      for (const swimmer of renderSwimmers) swimmer.draw(time);


      for (const puff of sandPuffs) puff.draw();
      for (const crab of renderCrabs) crab.draw(time);
      for (const seaweed of nearSeaweeds) seaweed.draw(time);

      for (const food of foods) food.draw();
      for (const bubble of bubbles) bubble.draw();

      for (let index = 1; index < dustParticles.length; index += 2) {
        dustParticles[index].draw();
      }
      for (const ripple of ripples) ripple.draw();

      drawNightLife(time);
    }

    function monitorPerformance(time) {
      if (!SETTINGS.adaptiveQuality) return;
      sampleFrames += 1;
      const elapsed = time - sampleStart;
      if (elapsed < 2000) return;

      const fps = (sampleFrames * 1000) / Math.max(1, elapsed);
      document.documentElement.dataset.fps = String(Math.round(fps));

      if (SETTINGS.adaptiveQuality && qualityName !== "low") {
        if (fps < quality.targetFps * 0.45) {
          lowerQuality();
          slowSamples = 0;
        } else if (fps < quality.targetFps * 0.76) {
          slowSamples += 1;
        } else {
          slowSamples = Math.max(0, slowSamples - 1);
        }
      }

      if (SETTINGS.adaptiveQuality && slowSamples >= 2) lowerQuality();
      sampleStart = time;
      sampleFrames = 0;
    }

    function sampleRefreshRate(time) {
      if (refreshSamplingDone) return;
      if (previousRafSample > 0) {
        const interval = time - previousRafSample;
        if (interval >= 3.5 && interval <= 24) refreshSamples.push(interval);
      }
      previousRafSample = time;

      if (refreshSamples.length < 24) return;
      const sorted = refreshSamples.slice().sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length * 0.5)];
      const refreshRate = 1000 / Math.max(1, median);

      // On 120/144/165/240 Hz screens, render every Nth refresh. This keeps
      // cadence even (no random frame skipping) and avoids drawing the full
      // aquarium hundreds of times per second.
      if (refreshRate > 105) {
        renderDivisor = Math.max(2, Math.round(refreshRate / 60));
      }
      document.documentElement.dataset.renderDivisor = String(renderDivisor);
      refreshSamplingDone = true;
    }

    function animate(time) {
      if (!animationRunning) return;
      animationFrameId = requestAnimationFrame(animate);
      sampleRefreshRate(time);

      if (!pageVisible) {
        lastTime = time;
        lastRenderedAt = time;
        return;
      }

      if (renderDivisor > 1) {
        renderTick = (renderTick + 1) % renderDivisor;
        if (renderTick !== 0) return;
      }

      const rawDelta = Math.max(0, (time - lastTime) / 1000);
      const cappedDelta = Math.min(rawDelta, SETTINGS.maxFrameDelta);
      const smoothing = cappedDelta > smoothedDelta * 1.8 ? 0.36 : 0.18;
      smoothedDelta += (cappedDelta - smoothedDelta) * smoothing;
      const motionScale = prefersReducedMotion ? 0.45 : 1;
      const dt = clamp(smoothedDelta, 1 / 180, SETTINGS.maxFrameDelta) * motionScale;

      lastTime = time;
      lastRenderedAt = time;
      update(dt, time);
      draw(time);
      monitorPerformance(time);
    }

    function startAnimationLoop() {
      if (animationRunning) return;
      animationRunning = true;
      lastTime = performance.now();
      lastRenderedAt = lastTime;
      smoothedDelta = 1 / 60;
      renderTick = 0;
      animationFrameId = requestAnimationFrame(animate);
    }

    function stopAnimationLoop() {
      animationRunning = false;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      animationFrameId = 0;
    }

    window.addEventListener("pagehide", stopAnimationLoop, { once: true });

    window.addEventListener("error", event => {
      document.documentElement.dataset.runtimeError = event.message || "unknown";
    });

    resizeCanvas();
    document.documentElement.dataset.appReady = "true";
    startAnimationLoop();
  </script>
</body>
</html>
