<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#061f2d" />
  <title>Bể cá </title>

  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(7, 35, 48, 0.34);
      --glass-hover: rgba(255, 255, 255, 0.20);
      --border: rgba(255, 255, 255, 0.24);
      --shadow: 0 12px 35px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #061f2d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      user-select: none;
    }

    body {
      position: relative;
      isolation: isolate;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .controls {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: max(18px, env(safe-area-inset-left));
      z-index: 10;
      display: flex;
      gap: 12px;
    }

    .control-button {
      position: relative;
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      padding: 0;
      color: #ffffff;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50%;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .control-button:hover {
      transform: translateY(-2px) scale(1.04);
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.42);
    }

    .control-button:active {
      transform: scale(0.95);
    }

    .control-button[aria-pressed="true"] {
      background: rgba(54, 201, 135, 0.28);
      border-color: rgba(122, 255, 192, 0.54);
    }

    .control-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .control-button::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      padding: 6px 9px;
      color: #ffffff;
      background: rgba(0, 12, 18, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -5px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .control-button:hover::after,
    .control-button:focus-visible::after {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .control-button:focus-visible {
      outline: 3px solid rgba(159, 231, 255, 0.65);
      outline-offset: 3px;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 10px 15px;
      color: rgba(255, 255, 255, 0.94);
      background: rgba(0, 20, 29, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: clamp(12px, 2vw, 14px);
      letter-spacing: 0.01em;
      text-align: center;
      transform: translateX(-50%);
      animation: hintFade 7s forwards;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.92);
      background: radial-gradient(circle at 50% 30%, #184e63, #061f2d 66%);
      transition: opacity 500ms ease, visibility 500ms ease;
    }

    .loading.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-inner {
      display: grid;
      justify-items: center;
      gap: 14px;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.20);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes hintFade {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    html[data-quality="low"] .control-button,
    html[data-quality="low"] .hint {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      background: rgba(4, 30, 42, 0.78);
    }

    html[data-quality="low"] .control-button {
      box-shadow: 0 7px 22px rgba(0, 0, 0, 0.30);
    }

    @media (max-width: 560px) {
      .controls {
        gap: 9px;
      }

      .control-button {
        width: 46px;
        height: 46px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .control-button,
      .hint,
      .spinner {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="loading" id="loading" aria-live="polite">
    <div class="loading-inner">
      <div class="spinner" aria-hidden="true"></div>
      <span>Đang dựng bể cá…</span>
    </div>
  </div>

  <div class="controls" aria-label="Điều khiển đại dương">
    <button
      class="control-button"
      id="backButton"
      type="button"
      data-tooltip="Quay lại"
      aria-label="Quay lại"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 12H5"></path>
        <path d="m11 18-6-6 6-6"></path>
      </svg>
    </button>

    <button
      class="control-button"
      id="themeButton"
      type="button"
      data-tooltip="Chuyển ngày / đêm"
      aria-label="Chuyển ngày hoặc đêm"
      aria-pressed="false"
    >
      <svg id="themeIcon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="m4.93 4.93 1.42 1.42"></path>
        <path d="m17.66 17.66 1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="m6.34 17.66-1.41 1.41"></path>
        <path d="m19.07 4.93-1.41 1.41"></path>
      </svg>
    </button>

    <button
      class="control-button"
      id="soundButton"
      type="button"
      data-tooltip="Âm thanh nước"
      aria-label="Bật hoặc tắt âm thanh nước"
      aria-pressed="false"
    >
      <svg id="soundIcon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5 6 9H2v6h4l5 4Z"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M18.07 5.93a9 9 0 0 1 0 12.73"></path>
      </svg>
    </button>
  </div>

    // ============================================================
    // HÀM TIỆN ÍCH
    // ============================================================
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const lerp = (a, b, amount) => a + (b - a) * amount;
    const random = (min, max) => min + Math.random() * (max - min);
    const chance = probability => Math.random() < probability;

    function normalizeAngle(angle) {
      while (angle > Math.PI) angle -= Math.PI * 2;
      while (angle < -Math.PI) angle += Math.PI * 2;
      return angle;
    }

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      const normalized = value.length === 3
        ? value.split("").map(char => char + char).join("")
        : value;

      const number = Number.parseInt(normalized, 16);
      return {
        r: (number >> 16) & 255,
        g: (number >> 8) & 255,
        b: number & 255
      };
    }

    function mixHex(first, second, amount) {
      const a = hexToRgb(first);
      const b = hexToRgb(second);
      const t = clamp(amount, 0, 1);
      return `rgb(${Math.round(lerp(a.r, b.r, t))}, ${Math.round(
        lerp(a.g, b.g, t)
      )}, ${Math.round(lerp(a.b, b.b, t))})`;
    }

    function drawImageCoverOn(
      targetContext,
      image,
      x,
      y,
      width,
      height,
      offsetX = 0.5,
      offsetY = 0.5
    ) {
      const imageRatio = image.width / image.height;
      const targetRatio = width / height;

      let sourceWidth = image.width;
      let sourceHeight = image.height;
      let sourceX = 0;
      let sourceY = 0;

      if (imageRatio > targetRatio) {
        sourceWidth = image.height * targetRatio;
        sourceX = (image.width - sourceWidth) * offsetX;
      } else {
        sourceHeight = image.width / targetRatio;
        sourceY = (image.height - sourceHeight) * offsetY;
      }

      targetContext.drawImage(
        image,
        sourceX,
        sourceY,
        sourceWidth,
        sourceHeight,
        x,
        y,
        width,
        height
      );
    }

    function drawImageCover(image, x, y, width, height, offsetX = 0.5, offsetY = 0.5) {
      drawImageCoverOn(ctx, image, x, y, width, height, offsetX, offsetY);
    }

    // ============================================================
    // ÂM THANH TẠO TRỰC TIẾP BẰNG WEB AUDIO
    // Không cần file MP3 bên ngoài.
    // ============================================================
    class UnderwaterAudio {
      constructor() {
        this.context = null;
        this.master = null;
        this.enabled = false;
        this.nodes = [];
      }

      async enable() {
        if (!this.context) this.createGraph();
        await this.context.resume();
        this.master.gain.cancelScheduledValues(this.context.currentTime);
        this.master.gain.setTargetAtTime(0.20, this.context.currentTime, 0.6);
        this.enabled = true;
      }

      disable() {
        if (!this.context || !this.master) return;
        this.master.gain.cancelScheduledValues(this.context.currentTime);
        this.master.gain.setTargetAtTime(0.0001, this.context.currentTime, 0.35);
        this.enabled = false;
      }

      createGraph() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) throw new Error("Trình duyệt không hỗ trợ Web Audio API.");

        this.context = new AudioContextClass();
        this.master = this.context.createGain();
        this.master.gain.value = 0.0001;
        this.master.connect(this.context.destination);

        // Nhiễu nước nhẹ.
        const noiseLength = this.context.sampleRate * 3;
        const noiseBuffer = this.context.createBuffer(
          1,
          noiseLength,
          this.context.sampleRate
        );
        const channel = noiseBuffer.getChannelData(0);
        let previous = 0;

        for (let index = 0; index < noiseLength; index += 1) {
          const white = Math.random() * 2 - 1;
          previous = previous * 0.985 + white * 0.015;
          channel[index] = previous * 2.4;
        }

        const noise = this.context.createBufferSource();
        noise.buffer = noiseBuffer;
        noise.loop = true;

        const noiseFilter = this.context.createBiquadFilter();
        noiseFilter.type = "lowpass";
        noiseFilter.frequency.value = 780;
        noiseFilter.Q.value = 0.8;

        const noiseGain = this.context.createGain();
        noiseGain.gain.value = 0.48;

        noise.connect(noiseFilter).connect(noiseGain).connect(this.master);
        noise.start();

        // Âm trầm rất nhẹ giúp tạo cảm giác ở dưới nước.
        const hum = this.context.createOscillator();
        hum.type = "sine";
        hum.frequency.value = 54;

        const humGain = this.context.createGain();
        humGain.gain.value = 0.08;
        hum.connect(humGain).connect(this.master);
        hum.start();

        // Điều biến chậm để âm thanh không bị phẳng.
        const lfo = this.context.createOscillator();
        const lfoGain = this.context.createGain();
        lfo.type = "sine";
        lfo.frequency.value = 0.09;
        lfoGain.gain.value = 190;
        lfo.connect(lfoGain).connect(noiseFilter.frequency);
        lfo.start();

        this.nodes.push(noise, noiseFilter, noiseGain, hum, humGain, lfo, lfoGain);
      }

      playEatSound(volume = 1) {
        if (!this.enabled || !this.context) return;

        const now = this.context.currentTime;
        const oscillator = this.context.createOscillator();
        const gain = this.context.createGain();
        const filter = this.context.createBiquadFilter();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(random(260, 360), now);
        oscillator.frequency.exponentialRampToValueAtTime(random(110, 160), now + 0.10);

        filter.type = "lowpass";
        filter.frequency.value = 760;

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.045 * volume, now + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

        oscillator.connect(filter).connect(gain).connect(this.master);
        oscillator.start(now);
        oscillator.stop(now + 0.14);
      }

      playWhaleCall() {
        if (!this.enabled || !this.context) return;

        const now = this.context.currentTime;
        const callGain = this.context.createGain();
        const lowpass = this.context.createBiquadFilter();
        const fundamental = this.context.createOscillator();
        const harmonic = this.context.createOscillator();
        const tremolo = this.context.createOscillator();
        const tremoloGain = this.context.createGain();

        lowpass.type = "lowpass";
        lowpass.frequency.value = 260;
        lowpass.Q.value = 0.75;

        fundamental.type = "sine";
        fundamental.frequency.setValueAtTime(78, now);
        fundamental.frequency.exponentialRampToValueAtTime(54, now + 1.8);
        fundamental.frequency.exponentialRampToValueAtTime(70, now + 3.5);

        harmonic.type = "triangle";
        harmonic.frequency.setValueAtTime(118, now);
        harmonic.frequency.exponentialRampToValueAtTime(82, now + 2.0);
        harmonic.frequency.exponentialRampToValueAtTime(104, now + 3.4);

        tremolo.type = "sine";
        tremolo.frequency.value = 1.35;
        tremoloGain.gain.value = 0.004;

        callGain.gain.setValueAtTime(0.0001, now);
        callGain.gain.exponentialRampToValueAtTime(0.016, now + 0.42);
        callGain.gain.setValueAtTime(0.013, now + 2.25);
        callGain.gain.exponentialRampToValueAtTime(0.0001, now + 3.7);

        tremolo.connect(tremoloGain).connect(callGain.gain);
        fundamental.connect(lowpass);
        harmonic.connect(lowpass);
        lowpass.connect(callGain).connect(this.master);

        fundamental.start(now);
        harmonic.start(now + 0.08);
        tremolo.start(now);
        fundamental.stop(now + 3.8);
        harmonic.stop(now + 3.8);
        tremolo.stop(now + 3.8);
      }
    }

    const underwaterAudio = new UnderwaterAudio();
    let nextWhaleCall = performance.now() + random(18000, 30000);

    // ============================================================
    // ĐỐI TƯỢNG MÔI TRƯỜNG
    // ============================================================
    class DustParticle {
      constructor(initial = false) {
        this.reset(initial);
      }

      reset(initial = false) {
        this.x = random(0, viewWidth);
        this.y = initial ? random(0, viewHeight) : viewHeight + random(0, 80);
        this.radius = random(0.45, 1.7);
        this.speedY = random(2.5, 10);
        this.speedX = random(-3, 3);
        this.phase = random(0, Math.PI * 2);
        this.alpha = random(0.08, 0.35);
        this.depth = random(0.45, 1.3);
      }

      update(dt, time) {
        this.y -= this.speedY * dt;
        this.x += (this.speedX + Math.sin(time * 0.00035 + this.phase) * 2.2) * dt;

        if (this.y < -8 || this.x < -20 || this.x > viewWidth + 20) {
          this.reset(false);
        }
      }

      draw() {
        ctx.beginPath();
        ctx.fillStyle = `rgba(224, 250, 255, ${this.alpha * (1 - nightAmount * 0.45)})`;
        ctx.arc(this.x, this.y, this.radius * this.depth, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Bubble {
      constructor(initial = false) {
        this.reset(initial);
      }

      reset(initial = false) {
        const source = chance(0.62) ? viewWidth * 0.19 : random(0.08, 0.92) * viewWidth;
        this.x = source + random(-28, 28);
        this.y = initial ? random(0, viewHeight) : viewHeight + random(0, 120);
        this.radius = random(1.4, 5.4);
        this.speed = random(22, 66);
        this.phase = random(0, Math.PI * 2);
        this.wobble = random(4, 13);
        this.alpha = random(0.18, 0.55);
      }

      update(dt, time) {
        this.y -= this.speed * dt;
        this.x += Math.sin(time * 0.002 + this.phase) * this.wobble * dt;

        if (this.y < -this.radius * 3) this.reset(false);
      }

      draw() {
        const diameter = this.radius * 2.9;
        ctx.save();
        ctx.globalAlpha = this.alpha * (1 - nightAmount * 0.18);
        ctx.drawImage(
          bubbleSprite,
          this.x - diameter * 0.5,
          this.y - diameter * 0.5,
          diameter,
          diameter
        );
        ctx.restore();
      }
    }

    class Ripple {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 5;
        this.alpha = 0.72;
        this.speed = 82;
      }

      update(dt) {
        this.radius += this.speed * dt;
        this.alpha -= 0.62 * dt;
      }

      draw() {
        ctx.save();
        ctx.strokeStyle = `rgba(230, 252, 255, ${Math.max(0, this.alpha)})`;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.34, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    class FoodParticle {
      constructor(x, y) {
        this.x = x + random(-18, 18);
        this.y = y + random(-6, 6);
        this.vx = random(-7, 7);
        this.vy = random(12, 25);
        this.radius = random(1.8, 3.3);
        this.life = 1;
        this.phase = random(0, Math.PI * 2);
        this.eaten = false;
      }

      update(dt, time) {
        this.y += this.vy * dt;
        this.x += (this.vx + Math.sin(time * 0.004 + this.phase) * 5) * dt;
        this.vy = Math.min(34, this.vy + 3 * dt);
        this.life -= 0.055 * dt;

        if (this.y > viewHeight - SETTINGS.waterBottomPadding) {
          this.life -= 0.7 * dt;
        }
      }

      draw() {
        const size = this.radius * 3.5;
        ctx.save();
        ctx.globalAlpha = clamp(this.life, 0, 1);
        ctx.drawImage(
          foodSprite,
          this.x - size * 0.5,
          this.y - size * 0.5,
          size,
          size
        );
        ctx.restore();
      }
    }

    // ============================================================
    // RONG BIỂN NHIỀU LỚP
    // ============================================================
    class Seaweed {
      constructor(initial = false) {
        this.reseed(initial);
      }

      reseed() {
        this.depth = random(0.48, 1.18);
        this.foreground = this.depth >= 0.86;

        const preferEdge = chance(this.foreground ? 0.76 : 0.48);
        if (preferEdge) {
          this.x = chance(0.5)
            ? random(-22, viewWidth * 0.24)
            : random(viewWidth * 0.76, viewWidth + 22);
        } else {
          this.x = random(-12, viewWidth + 12);
        }

        this.baseY = viewHeight - random(
          this.foreground ? 4 : 16,
          this.foreground ? 42 : 78
        );

        const minRatio = this.foreground ? 0.17 : 0.11;
        const maxRatio = this.foreground ? 0.37 : 0.29;
        this.height = clamp(
          viewHeight * random(minRatio, maxRatio) * lerp(0.78, 1.08, this.depth),
          62,
          this.foreground ? 390 : 280
        );
        this.ribbon = chance(this.foreground ? 0.58 : 0.38);
        this.width = random(this.ribbon ? 7.5 : 5.5, this.ribbon ? 15.5 : 11.5) * this.depth;
        this.amplitude = random(10, 28) * this.depth;
        this.speed = random(0.00055, 0.00092);
        this.phase = random(0, Math.PI * 2);
        this.opacity = this.foreground ? random(0.66, 0.90) : random(0.34, 0.58);

        const palettes = this.foreground
          ? [
              ["#376f3a", "#5f8e45", "#1d4f32"],
              ["#2a6c4d", "#4f9870", "#174737"],
              ["#52713a", "#79944b", "#314e2d"]
            ]
          : [
              ["#195648", "#2f765c", "#103d38"],
              ["#1e5d52", "#397c66", "#123f3a"]
            ];
        this.palette = palettes[Math.floor(random(0, palettes.length))];

        const bladeCount = Math.max(
          2,
          Math.round(random(2.8, 5.2) * quality.seaweedDetail)
        );
        this.blades = Array.from({ length: bladeCount }, (_, index) => ({
          offset: (index - (bladeCount - 1) / 2) * random(5.0, 8.8),
          heightScale: random(0.72, 1.08),
          amplitudeScale: random(0.72, 1.24),
          phase: random(-0.8, 0.8),
          leafCount: Math.max(
            1,
            Math.round(random(2.4, this.foreground ? 4.8 : 3.7) * quality.seaweedDetail)
          )
        }));
      }

      drawLeaf(x, y, size, angle, side, alpha, baseAlpha) {
        const rotation = angle + side * 0.78;
        const cosine = Math.cos(rotation);
        const sine = Math.sin(rotation);

        const c1x = x + size * 0.30 * cosine + size * 0.20 * sine;
        const c1y = y + size * 0.30 * sine - size * 0.20 * cosine;
        const c2x = x + size * 0.84 * cosine + size * 0.17 * sine;
        const c2y = y + size * 0.84 * sine - size * 0.17 * cosine;
        const tipX = x + size * cosine;
        const tipY = y + size * sine;
        const c3x = x + size * 0.76 * cosine - size * 0.19 * sine;
        const c3y = y + size * 0.76 * sine + size * 0.19 * cosine;
        const c4x = x + size * 0.25 * cosine - size * 0.18 * sine;
        const c4y = y + size * 0.25 * sine + size * 0.18 * cosine;

        ctx.globalAlpha = baseAlpha * alpha;
        ctx.fillStyle = side > 0 ? this.palette[1] : this.palette[0];
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.bezierCurveTo(c1x, c1y, c2x, c2y, tipX, tipY);
        ctx.bezierCurveTo(c3x, c3y, c4x, c4y, x, y);
        ctx.fill();
        ctx.globalAlpha = baseAlpha;
      }

      draw(time) {
        if (this.x < -90 || this.x > viewWidth + 90) return;

        const current = Math.sin(time * 0.00031 + this.phase) * 0.34;
        const parallax = this.foreground ? 7 : 3;

        ctx.save();
        ctx.translate(
          this.x + cameraX * parallax * this.depth,
          this.baseY + cameraY * parallax * 0.22
        );
        ctx.globalAlpha = this.opacity * (1 - nightAmount * 0.30);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (let index = 0; index < this.blades.length; index += 1) {
          const blade = this.blades[index];
          const bladeHeight = this.height * blade.heightScale;
          const baseX = blade.offset;
          const wave =
            Math.sin(time * this.speed + this.phase + blade.phase) + current;
          const tipX = baseX + wave * this.amplitude * blade.amplitudeScale;
          const controlX =
            baseX +
            wave * this.amplitude * 0.44 +
            Math.sin(time * this.speed * 0.63 + blade.phase) * this.amplitude * 0.18;

          if (this.ribbon) {
            const halfWidth = this.width * (0.43 + (index % 3) * 0.08);
            const topWidth = halfWidth * 0.26;
            ctx.fillStyle = index % 2 ? this.palette[0] : this.palette[1];
            ctx.beginPath();
            ctx.moveTo(baseX - halfWidth, 3);
            ctx.bezierCurveTo(
              baseX - halfWidth * 0.74 + wave * 2,
              -bladeHeight * 0.31,
              controlX - halfWidth * 0.58,
              -bladeHeight * 0.72,
              tipX - topWidth,
              -bladeHeight
            );
            ctx.quadraticCurveTo(
              tipX + wave * 0.7,
              -bladeHeight - this.width * 0.72,
              tipX + topWidth,
              -bladeHeight
            );
            ctx.bezierCurveTo(
              controlX + halfWidth * 0.58,
              -bladeHeight * 0.72,
              baseX + halfWidth * 0.74 + wave * 2,
              -bladeHeight * 0.31,
              baseX + halfWidth,
              3
            );
            ctx.closePath();
            ctx.fill();

            ctx.globalAlpha *= 0.34;
            ctx.strokeStyle = this.palette[2];
            ctx.lineWidth = Math.max(0.65, this.width * 0.085);
            ctx.beginPath();
            ctx.moveTo(baseX, 2);
            ctx.bezierCurveTo(
              baseX + wave * 2,
              -bladeHeight * 0.31,
              controlX,
              -bladeHeight * 0.72,
              tipX,
              -bladeHeight
            );
            ctx.stroke();
            ctx.globalAlpha = this.opacity * (1 - nightAmount * 0.30);
          } else {
            ctx.strokeStyle = index % 2 ? this.palette[0] : this.palette[2];
            ctx.lineWidth = Math.max(1.5, this.width * (0.48 + this.depth * 0.16));
            ctx.beginPath();
            ctx.moveTo(baseX, 3);
            ctx.bezierCurveTo(
              baseX + wave * 2,
              -bladeHeight * 0.31,
              controlX,
              -bladeHeight * 0.72,
              tipX,
              -bladeHeight
            );
            ctx.stroke();

            const leafCount = quality.detail ? blade.leafCount : Math.min(2, blade.leafCount);
            const tangent = Math.atan2(-bladeHeight, tipX - baseX);

            for (let leafIndex = 0; leafIndex < leafCount; leafIndex += 1) {
              const t = (leafIndex + 1) / (leafCount + 1);
              const eased = t * t * (3 - 2 * t);
              const leafX = lerp(baseX, tipX, eased) + Math.sin(t * Math.PI) * wave * 3;
              const leafY = -bladeHeight * t;
              const side = (leafIndex + index) % 2 === 0 ? 1 : -1;
              const leafSize = this.width * lerp(2.05, 1.16, t) * randomLeafScale(index, leafIndex);
              this.drawLeaf(
                leafX,
                leafY,
                leafSize,
                tangent + wave * 0.08,
                side,
                lerp(0.92, 0.62, t),
                this.opacity * (1 - nightAmount * 0.30)
              );
            }
          }
        }

        // Gốc rong tối giúp bám tự nhiên vào nền đá/cát.
        ctx.globalAlpha *= 0.56;
        ctx.fillStyle = this.palette[2];
        ctx.beginPath();
        ctx.ellipse(0, 2, this.width * 2.0, this.width * 0.56, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Giá trị giả-ngẫu-nhiên ổn định, tránh gọi Math.random trong mỗi khung hình.
    function randomLeafScale(bladeIndex, leafIndex) {
      return 0.88 + ((bladeIndex * 17 + leafIndex * 29) % 11) / 50;
    }

      {
        name: "blue",
        body: "#3287a9",
        light: "#bcecff",
        dark: "#123f59",
        fin: "rgba(75, 164, 198, 0.68)",
        stripe: "rgba(14, 56, 75, 0.28)",
        ratio: 0.36
      },
      {
        name: "angel",
        body: "#e1d8bc",
        light: "#fff9e8",
        dark: "#262b2e",
        fin: "rgba(224, 218, 196, 0.52)",
        stripe: "rgba(25, 31, 34, 0.82)",
        ratio: 0.58,
        tall: true
      }
    ];

    const FISH_SIZE_PROFILES = Object.freeze({
      small: Object.freeze({
        minLength: 18,
        maxLength: 31,
        minSpeed: 28,
        maxSpeed: 52,
        minTurn: 1.8,
        maxTurn: 2.8
      }),
      medium: Object.freeze({
        minLength: 38,
        maxLength: 60,
        minSpeed: 22,
        maxSpeed: 44,
        minTurn: 1.4,
        maxTurn: 2.3
      }),
      large: Object.freeze({
        minLength: 70,
        maxLength: 104,
        minSpeed: 14,
        maxSpeed: 30,
        minTurn: 1.0,
        maxTurn: 1.8
      })
    });

    class Fish {
      constructor(sizeClass = "medium") {
        this.sizeClass = Object.prototype.hasOwnProperty.call(
          FISH_SIZE_PROFILES,
          sizeClass
        ) ? sizeClass : "medium";

        const sizeProfile = FISH_SIZE_PROFILES[this.sizeClass];
        this.species = chance(0.13)
          ? SPECIES[4]
          : SPECIES[Math.floor(random(0, SPECIES.length - 1))];

        const depthRanges = {
          small: [0.52, 1.05],
          medium: [0.62, 1.12],
          large: [0.76, 1.18]
        };
        const [minDepth, maxDepth] = depthRanges[this.sizeClass];
        this.depth = random(minDepth, maxDepth);
        const depthScale = lerp(0.90, 1.08, clamp((this.depth - 0.5) / 0.7, 0, 1));
        this.length = random(sizeProfile.minLength, sizeProfile.maxLength) * depthScale;
        this.height = this.length * this.species.ratio;
        this.x = random(0, viewWidth);
        this.y = random(SETTINGS.waterTop + 30, viewHeight - 115);
        this.direction = chance(0.5) ? 1 : -1;
        this.angle = this.direction === 1 ? 0 : Math.PI;
        this.speed = random(sizeProfile.minSpeed, sizeProfile.maxSpeed) *
          (0.76 + this.depth * 0.28);
        this.maxSpeed = this.speed * random(1.22, 1.50);
        this.turnSpeed = random(sizeProfile.minTurn, sizeProfile.maxTurn);
        this.wanderAngle = random(-0.22, 0.22);
        this.wanderTimer = random(0.4, 2.0);
        this.phase = random(0, Math.PI * 2);
        this.tailFrequency = this.sizeClass === "large"
          ? random(3.8, 5.8)
          : this.sizeClass === "small"
            ? random(6.2, 8.8)
            : random(5.0, 7.2);
        this.targetFood = null;
        this.hungerCooldown = 0;
        const baseOpacity = this.sizeClass === "small" ? 0.72 : 0.80;
        this.opacity = lerp(baseOpacity, 1, clamp(this.depth, 0, 1));
      }

      chooseFood() {
        if (this.hungerCooldown > 0 || foods.length === 0) return;

        let nearest = null;
        let nearestDistance = 360 * 360;

        for (const food of foods) {
          if (food.eaten || food.life <= 0) continue;
          const dx = food.x - this.x;
          const dy = food.y - this.y;
          const distanceSquared = dx * dx + dy * dy;

          if (distanceSquared < nearestDistance) {
            nearestDistance = distanceSquared;
            nearest = food;
          }
        }

        if (nearest) this.targetFood = nearest;
      }

      update(dt, time) {
        this.hungerCooldown = Math.max(0, this.hungerCooldown - dt);
        this.wanderTimer -= dt;

        if (!this.targetFood || this.targetFood.eaten || this.targetFood.life <= 0) {
          this.targetFood = null;
          this.chooseFood();
        }

        let targetAngle = this.angle;
        let targetSpeed = this.speed;

        if (this.targetFood) {
          const dx = this.targetFood.x - this.x;
          const dy = this.targetFood.y - this.y;
          const distance = Math.hypot(dx, dy);
          targetAngle = Math.atan2(dy, dx);
          targetSpeed = this.maxSpeed;

          if (distance < Math.max(10, this.length * 0.30)) {
            this.targetFood.eaten = true;
            this.targetFood.life = 0;
            this.targetFood = null;
            this.hungerCooldown = random(0.45, 1.25);
            underwaterAudio.playEatSound(this.depth);
          }
        } else {
          if (this.wanderTimer <= 0) {
            this.wanderTimer = random(0.7, 2.2);
            this.wanderAngle = clamp(
              this.wanderAngle + random(-0.30, 0.30),
              -0.48,
              0.48
            );
          }

          targetAngle = this.angle + this.wanderAngle;
          targetSpeed = this.speed * (0.88 + Math.sin(time * 0.00055 + this.phase) * 0.08);
        }

        // Tránh mép bể bằng lực lái mềm.
        const marginX = Math.max(70, this.length * 1.8);
        const marginTop = SETTINGS.waterTop + 30;
        const marginBottom = SETTINGS.waterBottomPadding + 52;

        let steerX = 0;
        let steerY = 0;

        if (this.x < marginX) steerX += (marginX - this.x) / marginX;
        if (this.x > viewWidth - marginX) {
          steerX -= (this.x - (viewWidth - marginX)) / marginX;
        }
        if (this.y < marginTop) steerY += (marginTop - this.y) / marginTop;
        if (this.y > viewHeight - marginBottom) {
          steerY -= (this.y - (viewHeight - marginBottom)) / marginBottom;
        }

        if (steerX !== 0 || steerY !== 0) {
          const edgeAngle = Math.atan2(steerY, steerX);
          const strength = clamp(Math.hypot(steerX, steerY), 0, 1);
          const difference = normalizeAngle(edgeAngle - targetAngle);
          targetAngle += difference * strength * 0.92;
        }

        const angleDifference = normalizeAngle(targetAngle - this.angle);
        this.angle += angleDifference * Math.min(1, this.turnSpeed * dt);

        this.x += Math.cos(this.angle) * targetSpeed * dt;
        this.y += Math.sin(this.angle) * targetSpeed * dt;

        // Bảo vệ khi thay đổi kích thước cửa sổ.
        this.x = clamp(this.x, -this.length, viewWidth + this.length);
        this.y = clamp(
          this.y,
          SETTINGS.waterTop + 8,
          viewHeight - SETTINGS.waterBottomPadding
        );
      }

      draw(time) {
        const tailWave = Math.sin(time * 0.001 * this.tailFrequency + this.phase);
        const finWave = Math.sin(time * 0.001 * (this.tailFrequency * 0.72) + this.phase);
        const length = this.length;
        const height = this.height;
        const species = this.species;
        const mouthPulse = (Math.sin(time * 0.0044 + this.phase * 1.9) + 1) * 0.5;
        const mouthOpen = clamp(
          0.06 + mouthPulse * 0.26 + (this.targetFood ? 0.16 : 0),
          0.04,
          0.42
        );

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = this.opacity * (1 - nightAmount * 0.12);

        // Bóng mềm làm cá hòa vào không gian nước.
        ctx.save();
        ctx.translate(-length * 0.08, height * 0.52);
        ctx.scale(1, 0.32);
        if (quality.filters) ctx.filter = `blur(${Math.max(2, length * 0.06)}px)`;
        ctx.fillStyle = "rgba(0, 15, 23, 0.24)";
        ctx.beginPath();
        ctx.ellipse(0, 0, length * 0.62, height * 0.48, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Đuôi.
        ctx.save();
        ctx.translate(-length * 0.48, 0);
        ctx.rotate(tailWave * 0.18);
        const tailGradient = ctx.createLinearGradient(-length * 0.48, 0, 0, 0);
        tailGradient.addColorStop(0, "rgba(255,255,255,0.12)");
        tailGradient.addColorStop(0.28, species.fin);
        tailGradient.addColorStop(1, mixHex(species.body, species.dark, 0.22));
        ctx.fillStyle = tailGradient;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(
          -length * 0.29,
          -height * (0.82 + tailWave * 0.10),
          -length * 0.55,
          -height * 0.56
        );
        ctx.quadraticCurveTo(-length * 0.43, 0, -length * 0.55, height * 0.56);
        ctx.quadraticCurveTo(
          -length * 0.29,
          height * (0.82 - tailWave * 0.10),
          0,
          0
        );
        ctx.fill();
        ctx.restore();

        // Vây lưng.
        ctx.fillStyle = species.fin;
        ctx.beginPath();
        ctx.moveTo(-length * 0.20, -height * 0.36);
        ctx.quadraticCurveTo(
          -length * 0.02,
          -height * (species.tall ? 1.22 : 0.84) - finWave * 2,
          length * 0.22,
          -height * 0.30
        );
        ctx.quadraticCurveTo(length * 0.02, -height * 0.44, -length * 0.20, -height * 0.36);
        ctx.fill();

        // Vây bụng.
        ctx.beginPath();
        ctx.moveTo(-length * 0.08, height * 0.30);
        ctx.quadraticCurveTo(
          length * 0.02,
          height * (species.tall ? 1.20 : 0.76) + finWave * 2,
          length * 0.22,
          height * 0.27
        );
        ctx.quadraticCurveTo(length * 0.04, height * 0.41, -length * 0.08, height * 0.30);
        ctx.fill();

        // Thân cá với gradient nhiều lớp.
        const bodyGradient = ctx.createLinearGradient(
          -length * 0.48,
          -height,
          length * 0.52,
          height
        );
        bodyGradient.addColorStop(0, mixHex(species.dark, species.body, 0.44));
        bodyGradient.addColorStop(0.27, species.body);
        bodyGradient.addColorStop(0.52, species.light);
        bodyGradient.addColorStop(0.73, species.body);
        bodyGradient.addColorStop(1, species.dark);

        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.moveTo(-length * 0.48, 0);
        ctx.bezierCurveTo(
          -length * 0.34,
          -height * 0.86,
          length * 0.28,
          -height * 0.78,
          length * 0.53,
          -height * 0.12
        );
        ctx.quadraticCurveTo(length * 0.59, 0, length * 0.53, height * 0.12);
        ctx.bezierCurveTo(
          length * 0.26,
          height * 0.78,
          -length * 0.34,
          height * 0.86,
          -length * 0.48,
          0
        );
        ctx.closePath();
        ctx.fill();

        // Ánh phản chiếu trên lưng.
        const highlight = ctx.createLinearGradient(0, -height * 0.8, 0, height * 0.1);
        highlight.addColorStop(0, "rgba(255,255,255,0.54)");
        highlight.addColorStop(0.48, "rgba(255,255,255,0.08)");
        highlight.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = highlight;
        ctx.beginPath();
        ctx.ellipse(
          length * 0.05,
          -height * 0.19,
          length * 0.38,
          height * 0.35,
          -0.08,
          Math.PI,
          Math.PI * 2
        );
        ctx.fill();

        // Sọc của một số loài.
        if (species.stripe) {
          ctx.save();
          ctx.globalAlpha *= 0.88;
          ctx.strokeStyle = species.stripe;
          ctx.lineWidth = Math.max(1.2, length * 0.055);

          const stripePositions = species.tall
            ? [-0.22, 0.06, 0.29]
            : [-0.16, 0.12];

          for (const position of stripePositions) {
            ctx.beginPath();
            ctx.moveTo(length * position, -height * 0.61);
            ctx.quadraticCurveTo(
              length * (position - 0.04),
              0,
              length * position,
              height * 0.61
            );
            ctx.stroke();
          }
          ctx.restore();
        }

        // Vảy chỉ vẽ ở cá vừa/lớn để cá nhỏ đông hơn mà vẫn chạy mượt.
        if (this.sizeClass !== "small" && (quality.detail || this.sizeClass === "large")) {
          ctx.save();
          ctx.globalAlpha *= 0.19;
          ctx.strokeStyle = species.dark;
          ctx.lineWidth = 0.55;
          const scaleRadius = Math.max(2.4, length * 0.055);

          for (let row = -1; row <= 1; row += 1) {
            for (let column = -3; column <= 3; column += 1) {
              const scaleX = column * scaleRadius * 1.45 - length * 0.02;
              const scaleY = row * scaleRadius * 1.35 +
                (column % 2 ? scaleRadius * 0.45 : 0);

              if (
                Math.abs(scaleX) < length * 0.36 &&
                Math.abs(scaleY) < height * 0.43
              ) {
                ctx.beginPath();
                ctx.arc(scaleX, scaleY, scaleRadius, -0.25, Math.PI + 0.25);
                ctx.stroke();
              }
            }
          }
          ctx.restore();
        }

        // Đường mang.
        ctx.strokeStyle = "rgba(30, 25, 18, 0.32)";
        ctx.lineWidth = Math.max(0.75, length * 0.012);
        ctx.beginPath();
        ctx.arc(length * 0.31, 0, height * 0.36, Math.PI * 0.60, Math.PI * 1.40);
        ctx.stroke();

        // Vây ngực trong suốt.
        ctx.save();
        ctx.translate(length * 0.02, height * 0.10);
        ctx.rotate(0.48 + finWave * 0.12);
        ctx.fillStyle = "rgba(246, 251, 245, 0.28)";
        ctx.beginPath();
        ctx.ellipse(0, 0, length * 0.20, height * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Mắt có phản quang.
        const eyeX = length * 0.37;
        const eyeY = -height * 0.18;
        const eyeRadius = Math.max(2.2, height * 0.13);

        ctx.fillStyle = "rgba(249, 242, 219, 0.96)";
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, eyeRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#101719";
        ctx.beginPath();
        ctx.arc(eyeX + eyeRadius * 0.19, eyeY, eyeRadius * 0.58, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.beginPath();
        ctx.arc(
          eyeX + eyeRadius * 0.03,
          eyeY - eyeRadius * 0.25,
          eyeRadius * 0.18,
          0,
          Math.PI * 2
        );
        ctx.fill();

        // Miệng há khép nhẹ theo nhịp bơi để cá trông sống động hơn.
        const mouthX = length * 0.50;
        const mouthY = height * 0.03;
        const mouthTipX = length * 0.56;
        const jawDrop = height * (0.04 + mouthOpen * 0.18);

        ctx.fillStyle = "rgba(38, 24, 18, 0.18)";
        ctx.beginPath();
        ctx.moveTo(mouthX - length * 0.018, mouthY - height * 0.010);
        ctx.quadraticCurveTo(length * 0.55, mouthY + jawDrop * 0.18, mouthTipX, mouthY);
        ctx.quadraticCurveTo(
          length * 0.53,
          mouthY + jawDrop * 0.64,
          mouthX - length * 0.006,
          mouthY + jawDrop * 0.58
        );
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(42, 30, 22, 0.70)";
        ctx.lineWidth = Math.max(0.75, length * 0.0065);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(mouthX - length * 0.012, mouthY - height * 0.010);
        ctx.quadraticCurveTo(length * 0.545, mouthY - height * 0.020, mouthTipX, mouthY);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(mouthX, mouthY + height * 0.012);
        ctx.quadraticCurveTo(
          length * 0.545,
          mouthY + jawDrop * 0.92,
          mouthTipX - length * 0.002,
          mouthY + jawDrop * 0.68
        );
        ctx.stroke();

        // Cá thần tiên có hai sợi vây dài.
        if (species.tall) {
          ctx.strokeStyle = "rgba(238, 237, 221, 0.58)";
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(length * 0.04, height * 0.28);
          ctx.quadraticCurveTo(
            length * 0.17,
            height * 1.35,
            -length * 0.03 + Math.sin(time * 0.002 + this.phase) * 5,
            height * 1.85
          );
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(length * 0.16, height * 0.27);
          ctx.quadraticCurveTo(
            length * 0.30,
            height * 1.20,
            length * 0.16 + Math.sin(time * 0.0022 + this.phase) * 5,
            height * 1.65
          );
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    // ============================================================
    // SINH VẬT LỚN VÀ SINH VẬT ĐÁY
    // ============================================================
    class BlueWhale {
      constructor(initial = false) {
        // Chỉ còn một cá voi xanh lớn, nằm ở lớp nước xa.
        this.isDistant = true;
        this.depth = random(0.14, 0.24);
        this.direction = chance(0.5) ? 1 : -1;
        this.speed = random(5.2, 7.6);
        this.phase = random(0, Math.PI * 2);
        this.opacity = random(0.58, 0.67);
        this.bodyRatio = random(0.120, 0.134);
        this.sprite = document.createElement("canvas");
        this.spriteLogicalWidth = 1;
        this.spriteLogicalHeight = 1;
        this.spriteOriginX = 0;
        this.spriteOriginY = 0;

        // Các đốm da được tạo một lần để không nhấp nháy giữa các khung hình.
        this.mottles = Array.from({ length: 42 }, (_, index) => ({
          x: random(-0.36, 0.43),
          y: random(-0.43, 0.40),
          rx: random(0.004, 0.014),
          ry: random(0.026, 0.085),
          rotation: random(-0.85, 0.85),
          alpha: random(0.045, 0.14),
          light: index % 3 !== 0
        }));

        this.reseed(initial);
      }

      traceBody(target, length, height) {
        target.beginPath();
        target.moveTo(-length * 0.505, -height * 0.01);
        target.bezierCurveTo(
          -length * 0.40,
          -height * 0.24,
          -length * 0.14,
          -height * 0.68,
          length * 0.20,
          -height * 0.66
        );
        target.bezierCurveTo(
          length * 0.36,
          -height * 0.65,
          length * 0.49,
          -height * 0.49,
          length * 0.548,
          -height * 0.25
        );
        target.quadraticCurveTo(
          length * 0.585,
          -height * 0.05,
          length * 0.548,
          height * 0.15
        );
        target.bezierCurveTo(
          length * 0.49,
          height * 0.38,
          length * 0.27,
          height * 0.51,
          length * 0.035,
          height * 0.46
        );
        target.bezierCurveTo(
          -length * 0.20,
          height * 0.41,
          -length * 0.40,
          height * 0.20,
          -length * 0.505,
          -height * 0.01
        );
        target.closePath();
      }

      reseed(initial = false) {
        this.length = viewWidth < 700
          ? clamp(viewWidth * random(0.58, 0.70), 245, 395)
          : clamp(viewWidth * random(0.36, 0.45), 430, 720);

        this.height = this.length * this.bodyRatio;
        this.baseY = random(viewHeight * 0.19, viewHeight * 0.33);
        this.y = this.baseY;
        this.pitch = 0;

        if (initial) {
          this.x = random(this.length * 0.10, Math.max(this.length * 0.10, viewWidth - this.length * 0.10));
        } else {
          this.x = this.direction === 1
            ? -this.length * 0.96
            : viewWidth + this.length * 0.96;
        }

        this.buildSprite();
      }

      buildSprite() {
        if (!this.length || !this.height) return;

        const length = this.length;
        const height = this.height;
        const logicalWidth = length * 1.54;
        const logicalHeight = height * 3.28;
        const originX = length * 0.77;
        const originY = height * 1.62;
        const maxScale = qualityName === "high" ? 0.96 : 0.86;
        const spriteScale = clamp(Math.min(Math.max(dpr, 0.80), maxScale), 0.76, 0.96);

        const base = document.createElement("canvas");
        base.width = Math.max(1, Math.round(logicalWidth * spriteScale));
        base.height = Math.max(1, Math.round(logicalHeight * spriteScale));
        const target = base.getContext("2d", { alpha: true });
        target.imageSmoothingEnabled = true;
        target.imageSmoothingQuality = "medium";
        target.setTransform(
          spriteScale,
          0,
          0,
          spriteScale,
          originX * spriteScale,
          originY * spriteScale
        );
        this.paintSprite(target, length, height);

        // Làm mờ và giảm tương phản một lần khi dựng sprite, không dùng filter mỗi khung hình.
        const softened = document.createElement("canvas");
        softened.width = base.width;
        softened.height = base.height;
        const softTarget = softened.getContext("2d", { alpha: true });
        softTarget.imageSmoothingEnabled = true;
        softTarget.imageSmoothingQuality = "medium";
        softTarget.filter = `blur(${qualityName === "low" ? 0.75 : 1.10}px) saturate(86%) contrast(92%) brightness(95%)`;
        softTarget.drawImage(base, 0, 0);
        softTarget.filter = "none";
        this.sprite = softened;

        this.spriteLogicalWidth = logicalWidth;
        this.spriteLogicalHeight = logicalHeight;
        this.spriteOriginX = originX;
        this.spriteOriginY = originY;
      }

      paintSprite(target, length, height) {
        target.save();
        target.lineJoin = "round";
        target.lineCap = "round";

        // Bóng nước mềm đã được lưu vào sprite.
        target.save();
        target.scale(1, 0.38);
        target.fillStyle = "rgba(0,12,22,0.14)";
        target.beginPath();
        target.ellipse(-length * 0.01, height * 1.18, length * 0.50, height * 0.80, 0, 0, Math.PI * 2);
        target.fill();
        target.restore();

        // Vây ngực phía xa: dài, hẹp và hơi quét về sau.
        const farFin = target.createLinearGradient(length * 0.10, height * 0.20, -length * 0.08, height * 1.02);
        farFin.addColorStop(0, "rgba(64,101,118,0.66)");
        farFin.addColorStop(1, "rgba(18,47,62,0.15)");
        target.fillStyle = farFin;
        target.beginPath();
        target.moveTo(length * 0.105, height * 0.20);
        target.bezierCurveTo(
          length * 0.08,
          height * 0.48,
          length * 0.005,
          height * 0.87,
          -length * 0.095,
          height * 1.10
        );
        target.bezierCurveTo(
          -length * 0.075,
          height * 0.63,
          -length * 0.025,
          height * 0.27,
          length * 0.105,
          height * 0.20
        );
        target.fill();

        // Đuôi ngang rộng của cá voi xanh, nhìn hơi nghiêng từ bên hông.
        target.save();
        target.translate(-length * 0.495, 0);
        target.scale(1, 0.37);
        const flukeGradient = target.createLinearGradient(-length * 0.23, -height, length * 0.01, height);
        flukeGradient.addColorStop(0, "#183747");
        flukeGradient.addColorStop(0.50, "#527889");

      update(dt, time) {
        this.x += this.direction * this.speed * dt;
        this.y =
          this.baseY +
          Math.sin(time * 0.00016 + this.phase) * 3.8 +
          Math.sin(time * 0.000065 + this.phase * 0.72) * 1.8;
        this.pitch = Math.cos(time * 0.00016 + this.phase) * 0.0075;

        const passedRight = this.direction === 1 && this.x > viewWidth + this.length * 0.96;
        const passedLeft = this.direction === -1 && this.x < -this.length * 0.96;
        if (passedRight || passedLeft) {
          if (chance(0.22)) this.direction *= -1;
          this.speed = random(5.2, 7.6);
          this.opacity = random(0.58, 0.67);
          this.reseed(false);
        }
      }

      draw(time) {
        const margin = this.length * 0.96;
        if (this.x < -margin || this.x > viewWidth + margin) return;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.pitch);
        ctx.scale(this.direction, 1 + Math.sin(time * 0.00105 + this.phase) * 0.0035);
        ctx.globalAlpha = this.opacity * (1 - nightAmount * 0.04);
        ctx.drawImage(
          this.sprite,
          -this.spriteOriginX,
          -this.spriteOriginY,
          this.spriteLogicalWidth,
          this.spriteLogicalHeight
        );
        ctx.restore();
      }
    }

    class Dolphin {
      constructor(initial = false) {

        this.direction = chance(0.5) ? 1 : -1;
        this.phase = random(0, Math.PI * 2);
        this.speed = random(30, 44);
        this.opacity = random(0.90, 0.98);
        this.bodyRatio = random(0.195, 0.215);
        this.circleTimer = 0;
        this.circleCenterX = 0;
        this.circleCenterY = 0;
        this.circleRadius = 0;
        this.circleAngle = random(0, Math.PI * 2);

      traceBody(length, height) {
        ctx.beginPath();
        ctx.moveTo(-length * 0.49, 0);
        ctx.bezierCurveTo(
          -length * 0.34,
          -height * 0.36,
          length * 0.10,
          -height * 0.72,
          length * 0.34,
          -height * 0.40
        );
        ctx.quadraticCurveTo(length * 0.405, -height * 0.32, length * 0.43, -height * 0.16);
        ctx.lineTo(length * 0.555, -height * 0.055);

        ctx.lineTo(length * 0.405, height * 0.13);

          length * 0.30,
          height * 0.58,
          -length * 0.30,
          height * 0.47,
          -length * 0.49,
          0

      reseed(initial = false) {
        const mobile = viewWidth < 700;
        this.length = (mobile ? random(125, 172) : random(180, 238)) * this.depth;
        this.height = this.length * this.bodyRatio;
        this.baseY = random(viewHeight * 0.23, viewHeight * 0.62);
        this.y = this.baseY;
        this.pitch = 0;

        if (initial) {
          this.x = random(viewWidth * 0.16, viewWidth * 0.84);
        } else {

            ? -this.length * 0.76
            : viewWidth + this.length * 0.76;

      containsPoint(x, y) {
        const dx = x - this.x;
        const dy = y - this.y;
        return Math.abs(dx) <= this.length * 0.56 && Math.abs(dy) <= this.height * 1.08;

        this.circleCenterY = clamp(
          this.y,
          SETTINGS.waterTop + this.circleRadius + 18,
          viewHeight - SETTINGS.waterBottomPadding - this.circleRadius - 18
        );
        this.circleAngle = Math.atan2(this.y - this.circleCenterY, this.x - this.circleCenterX);

          const targetY = this.circleCenterY + Math.sin(this.circleAngle) * this.circleRadius * 0.72;
          this.x += (targetX - this.x) * Math.min(1, dt * 5.2);
          this.y += (targetY - this.y) * Math.min(1, dt * 5.2);
          this.baseY = this.y;
          this.direction = Math.cos(this.circleAngle + this.circleDirection * 0.18) >= 0 ? 1 : -1;
          this.pitch = Math.sin(this.circleAngle + this.circleDirection * Math.PI * 0.5) * 0.22;

          this.baseY +

          Math.sin(time * 0.00155 + this.phase * 1.7) * 3.2;

        const passedLeft = this.direction === -1 && this.x < -this.length * 0.80;
        if (passedRight || passedLeft) {
          if (chance(0.42)) this.direction *= -1;

        const height = this.height;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.pitch);
        ctx.scale(this.direction, 1);
        ctx.globalAlpha = this.opacity * (1 - nightAmount * 0.05);

        ctx.save();

        ctx.bezierCurveTo(-length * 0.07, -height * 1.28, length * 0.03, -height * 1.48, length * 0.035, -height * 0.46);

        bodyGradient.addColorStop(0.25, "#4f7688");
        bodyGradient.addColorStop(0.54, "#86a6b2");
        bodyGradient.addColorStop(0.76, "#b9c8c9");
        bodyGradient.addColorStop(1, "#5f8491");

        bellyGradient.addColorStop(0, "rgba(222, 232, 230, 0.12)");

        ctx.arc(eyeX, eyeY, Math.max(1.15, length * 0.0065), 0, Math.PI * 2);

        ctx.fill();

        const mouthTipX = length * 0.558;
        const mouthBaseY = height * 0.048;
        const jawDrop = height * (0.03 + mouthOpen * 0.55);

          mouthBaseY + jawDrop * 0.24,

        );

        ctx.restore();
